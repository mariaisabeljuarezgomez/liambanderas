# ─────────────────────────────────────────────────────────────
# Railway / Nixpacks deployment config
#
# This is a STATIC site (HTML/CSS/JS + two mp3s). No Python, no
# requirements.txt, no backend logic. We just serve the files.
# Nixpacks detects Node (from package.json), installs `serve`, and
# runs `npm start`. PORT is provided by Railway automatically.
# ─────────────────────────────────────────────────────────────

[phases.setup]
nixPkgs = ["nodejs"]

# Install only runtime deps (devDependencies like puppeteer are skipped).
[phases.install]
cmds = ["npm install --omit=dev"]

[start]
cmd = "serve . --no-clipboard --listen ${PORT:-3000} --no-port-switching"
