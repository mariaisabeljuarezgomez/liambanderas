<!-- Simple interaction script for audio and feedback -->
<script>
        document.getElementById('audio-prompt').addEventListener('click', function() {
            // Simulate speaking
            QuizAudioController.speakBilingual(\'¿Cuál es la bandera?\', \'Which is the flag?\');
            }
        });

        // Toggle volume icon state
        document.getElementById('global-volume').addEventListener('click', function() {
            const icon = this.querySelector('span');
            if (icon.innerText === 'volume_up') {
                icon.innerText = 'volume_off';
            } else {
                icon.innerText = 'volume_up';
            }
        });
    </script>

    <!-- Custom Feedback Modal -->
    <div id="quiz-feedback-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex-col items-center justify-center p-6 backdrop-blur-sm transition-all">
        <div id="quiz-modal-content" class="bg-surface-container-lowest p-8 rounded-3xl w-full max-w-sm flex flex-col items-center text-center gap-6 transform transition-transform scale-95 border-b-8 border-primary-container shadow-2xl">
            <div id="quiz-modal-icon-bg" class="w-24 h-24 rounded-full bg-primary-container flex items-center justify-center mb-2 animate-bounce">
                <span id="quiz-modal-icon" class="material-symbols-outlined text-white text-6xl" style="font-variation-settings: 'FILL' 1;">star</span>
            </div>
            <div>
                <h2 id="quiz-modal-title" class="font-headline-lg text-primary mb-2">¡Excelente!</h2>
                <p id="quiz-modal-subtitle" class="font-body-lg text-on-surface-variant">Great job!</p>
            </div>
            <button onclick="document.getElementById('quiz-feedback-modal').classList.replace('flex', 'hidden');" class="w-full py-4 bg-primary text-white font-label-bold rounded-full active:scale-95 transition-transform mt-2 border-b-4 border-on-primary-container">
                CONTINUAR
            </button>
        </div>
    </div>

    <script>
        const QuizAudioController = {
            ctx: null,
            initContext() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            playSuccess() {
                this.initContext();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, this.ctx.currentTime); // C5
                osc.frequency.setValueAtTime(659.25, this.ctx.currentTime + 0.1); // E5
                osc.frequency.setValueAtTime(783.99, this.ctx.currentTime + 0.2); // G5
                osc.frequency.setValueAtTime(1046.50, this.ctx.currentTime + 0.3); // C6
                
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, this.ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.5);
            },
            playError() {
                this.initContext();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, this.ctx.currentTime + 0.3);
                
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.3);
            },
            alarm() {
                this.initContext();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, this.ctx.currentTime);
                osc.frequency.setValueAtTime(600, this.ctx.currentTime + 0.25);
                osc.frequency.setValueAtTime(400, this.ctx.currentTime + 0.5);
                osc.frequency.setValueAtTime(600, this.ctx.currentTime + 0.75);
                
                gain.gain.value = 0.1;
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 1.0);
            },
            speakBilingual(es, en) {
                if (!('speechSynthesis' in window)) return;
                this.initContext();
                try { window.speechSynthesis.cancel(); } catch(e) {}
                
                setTimeout(() => {
                    const uEs = new SpeechSynthesisUtterance(es);
                    uEs.lang = 'es-ES';
                    uEs.rate = 0.95;
                    
                    uEs.onend = () => {
                        const uEn = new SpeechSynthesisUtterance(en);
                        uEn.lang = 'en-US';
                        uEn.rate = 0.95;
                        window.speechSynthesis.speak(uEn);
                    };
                    window.speechSynthesis.speak(uEs);
                }, 80);
            }
        };
    </script>
