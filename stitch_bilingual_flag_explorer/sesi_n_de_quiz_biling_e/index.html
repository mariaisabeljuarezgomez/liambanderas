    let currentIdx = parseInt(sessionStorage.getItem('level1_quiz_index') || '0', 10);
    if (isNaN(currentIdx) || currentIdx < 0 || currentIdx >= QUESTIONS.length) {
      currentIdx = 0;
    }

    const currentQuestion = QUESTIONS[currentIdx];

    const QuizAudioController = {
        ctx: null,
        initContext() {
            if (!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (this.ctx.state === 'suspended') {
                this.ctx.resume();
            }
        },
        playSuccess() {
            this.initContext();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, this.ctx.currentTime); // C5
            osc.frequency.setValueAtTime(659.25, this.ctx.currentTime + 0.1); // E5
            osc.frequency.setValueAtTime(783.99, this.ctx.currentTime + 0.2); // G5
            osc.frequency.setValueAtTime(1046.50, this.ctx.currentTime + 0.3); // C6
            
            gain.gain.setValueAtTime(0, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.3, this.ctx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
            
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.5);
        },
        playError() {
            this.initContext();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, this.ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, this.ctx.currentTime + 0.3);
            
            gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
            
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.3);
        },
        alarm() {
            this.initContext();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, this.ctx.currentTime);
            osc.frequency.setValueAtTime(600, this.ctx.currentTime + 0.25);
            osc.frequency.setValueAtTime(400, this.ctx.currentTime + 0.5);
            osc.frequency.setValueAtTime(600, this.ctx.currentTime + 0.75);
            
            gain.gain.value = 0.1;
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 1.0);
        },
        speakBilingual(es, en) {
            if (!('speechSynthesis' in window)) return;
            this.initContext();
            try { window.speechSynthesis.cancel(); } catch(e) {}
            
            setTimeout(() => {
                const uEs = new SpeechSynthesisUtterance(es);
                uEs.lang = 'es-ES';
                uEs.rate = 0.95;
                
                uEs.onend = () => {
                    const uEn = new SpeechSynthesisUtterance(en);
                    uEn.lang = 'en-US';
                    uEn.rate = 0.95;
                    window.speechSynthesis.speak(uEn);
                };
                window.speechSynthesis.speak(uEs);
            }, 80);
        }
    };

    window.addEventListener('load', () => {
        const level1Keys = ['mexico', 'usa', 'canada', 'france', 'italy', 'spain', 'brazil', 'japan', 'germany', 'australia'];
        const allCompleted = level1Keys.every(k => localStorage.getItem(k + '_completed') === 'true');
        if (!allCompleted) {
            QuizAudioController.speakBilingual("¡Pinta las diez banderas primero para jugar el quiz!", "Paint all ten flags first to play the quiz!");
            setTimeout(() => {
                window.location.href = '../world_map_hub/index.html';
            }, 3000);
            return;
        }

        // Render progress
        const stepNum = currentIdx + 1;
        document.getElementById('quiz-progress-text').innerHTML = `Pregunta ${stepNum}/10 <span class="text-[10px] text-outline font-bold uppercase ml-2">Question ${stepNum}/10</span>`;
        document.getElementById('quiz-progress-percent').innerText = `${stepNum * 10}%`;
        document.getElementById('quiz-progress-bar').style.width = `${stepNum * 10}%`;

        // Render flag
        document.getElementById('quiz-flag-img').src = currentQuestion.flag;

        // Generate choices: 1 correct, 2 incorrect
        const incorrectPool = QUESTIONS.filter(q => q.id !== currentQuestion.id);
        incorrectPool.sort(() => Math.random() - 0.5);
        const choices = [currentQuestion, incorrectPool[0], incorrectPool[1]];
        choices.sort(() => Math.random() - 0.5);

        const optionsContainer = document.getElementById('quiz-options-container');
        optionsContainer.innerHTML = '';

        choices.forEach(choice => {
            const isCorrect = choice.id === currentQuestion.id;
            const btn = document.createElement('button');
            btn.className = 'tactile-button-secondary w-full min-h-[112px] flex items-center justify-between px-6 py-4';
            btn.innerHTML = `
                <div class="flex items-center gap-6">
                    <div class="flex flex-col items-start justify-center text-left">
                        <span class="font-headline-md text-headline-md text-on-surface">${choice.es}</span>
                        <span class="text-body-lg text-outline font-bold uppercase">${choice.en}</span>
                    </div>
                </div>
                <div class="w-20 h-20 bg-secondary-container rounded-full flex items-center justify-center shadow-md pulse-audio">
                    <span class="material-symbols-outlined text-on-secondary-container text-5xl fill-icon">volume_up</span>
                </div>
            `;

            const volBtn = btn.querySelector('.pulse-audio');
            volBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                QuizAudioController.speakBilingual(choice.es, choice.en);
            });

            btn.addEventListener('click', () => handleChoice(btn, isCorrect, choice.es, choice.en));
            optionsContainer.appendChild(btn);
        });

        setTimeout(speakQuestionPrompt, 600);
    });

    const headerVolBtn = document.querySelector('header button:last-child');
    if (headerVolBtn) {
        headerVolBtn.addEventListener('click', speakQuestionPrompt);
    }

    function showCustomFeedback(isSuccess, titleEs, subtitleEn, callback) {
        const modal = document.getElementById('quiz-feedback-modal');
        const modalContent = document.getElementById('quiz-modal-content');
        const iconBg = document.getElementById('quiz-modal-icon-bg');
        const icon = document.getElementById('quiz-modal-icon');
        const title = document.getElementById('quiz-modal-title');
        const subtitle = document.getElementById('quiz-modal-subtitle');
        const continueBtn = modal.querySelector('button');
        
        modal.classList.replace('hidden', 'flex');
        
        title.innerText = titleEs;
        subtitle.innerText = subtitleEn;
        
        if (isSuccess) {
            iconBg.className = "w-24 h-24 rounded-full bg-tertiary-container flex items-center justify-center mb-2 animate-bounce";
            icon.innerText = "celebration";
            modalContent.style.borderColor = "#59be1b";
            QuizAudioController.playSuccess();
            QuizAudioController.speakBilingual(titleEs, subtitleEn);
        } else {
            iconBg.className = "w-24 h-24 rounded-full bg-error-container flex items-center justify-center mb-2";
            icon.innerText = "refresh";
            icon.classList.add("text-error");
            modalContent.style.borderColor = "#ba1a1a";
            QuizAudioController.playError();
            QuizAudioController.speakBilingual(titleEs, subtitleEn);
        }

        continueBtn.onclick = () => {
            modal.classList.replace('flex', 'hidden');
            if (callback) callback();
        };
    }

    function handleChoice(button, isCorrect, esName, enName) {
        if (isCorrect) {
            button.classList.remove('tactile-button-secondary');
            button.classList.add('correct-choice');
            triggerConfetti();
            
            if (window.navigator.vibrate) {
                window.navigator.vibrate([100, 30, 100]);
            }
            
            setTimeout(() => {
                showCustomFeedback(true, `¡Excelente! Es la bandera de ${esName}.`, `Excellent! That's the flag of ${enName}.`, () => {
                    if (currentIdx >= QUESTIONS.length - 1) {
                        sessionStorage.removeItem('level1_quiz_index');
                        window.location.href = '../world_map_hub/index.html';
                    } else {
                        sessionStorage.setItem('level1_quiz_index', currentIdx + 1);
                        window.location.reload();
                    }
                });
            }, 1000);
        } else {
            button.style.transform = "translateX(10px)";
            button.classList.add('bg-error-container');
            QuizAudioController.speakBilingual("¡Casi! Inténtalo de nuevo.", "Almost! Try it again.");
            setTimeout(() => {
                button.style.transform = "";
                button.classList.remove('bg-error-container');
            }, 200);
        }
    }

    function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        const colors = ['#fccc00', '#2bb1ff', '#92fc58', '#ffdad6', '#ffffff'];

        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: canvas.height + Math.random() * 100,
                size: Math.random() * 8 + 4,
                color: colors[Math.floor(Math.random() * colors.length)],
                speedY: Math.random() * -10 - 10,
                speedX: Math.random() * 10 - 5,
                rotation: Math.random() * 360,
                rotSpeed: Math.random() * 10 - 5
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.y += p.speedY;
                p.x += p.speedX;
                p.speedY += 0.25; 
                p.rotation += p.rotSpeed;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                ctx.restore();

                if (p.y > canvas.height + 50) {
                    particles.splice(i, 1);
                }
            });

            if (particles.length > 0) {
                requestAnimationFrame(animate);
            }
        }
        animate();
    }
</script>
