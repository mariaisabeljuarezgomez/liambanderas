<!DOCTYPE html><html lang="en"><head>

<style>
        body {
            font-family: 'Quicksand', sans-serif;
            cursor: none; /* Hide default cursor for Smart Brush */
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            user-select: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .smart-brush {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease-out;
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.1));
        }
        .tactile-shadow {
            box-shadow: 0 6px 0 0 rgba(0, 0, 0, 0.15);
        }
        .active-paint-green { border-bottom: 8px solid #1a4600 !important; transform: translateY(-4px); }
        .active-paint-white { border-bottom: 8px solid #bec8d3 !important; transform: translateY(-4px); }
        .active-paint-red { border-bottom: 8px solid #93000a !important; transform: translateY(-4px); }
        
        /* Flag Section Transitions */
        .flag-section {
            transition: background-color 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        /* Sparkle Animation */
        @keyframes sparkle {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }
        .sparkle {
            position: absolute;
            pointer-events: none;
            animation: sparkle 0.8s ease-out forwards;
            color: #ffd700;
        }
        
        /* Floating Animation for Speaker */
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .animate-pulse-soft {
            animation: pulse-soft 3s infinite ease-in-out;
        }

        /* Paint fill animation */
        .paint-fill {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            pointer-events: none;
            z-index: 1;
        }
        .animate-paint {
            animation: fill-expand 0.6s ease-out forwards;
        }
        @keyframes fill-expand {
            to { transform: scale(4); }
        }
    </style>

<script>

    // Audio Controller Module
    const AudioController = {
        ctx: null,
        
        initContext() {
            if (!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
        },

        playSynth(freq, type, duration = 0.2, volume = 0.1) {
            try {
                this.initContext();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(volume, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            } catch(e) {
                console.log(e);
            }
        },

        boing() {
            this.playSynth(150, 'sine', 0.3, 0.25);
            this.playSynth(100, 'square', 0.1, 0.05);
        },

        sparkleSound() {
            try {
                this.initContext();
                const now = this.ctx.currentTime;
                [880, 1100, 1320].forEach((f, i) => {
                    setTimeout(() => {
                        this.playSynth(f, 'triangle', 0.15, 0.05);
                    }, i * 60);
                });
            } catch(e) {}
        },

        victory() {
            try {
                this.initContext();
                const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
                notes.forEach((f, i) => {
                    setTimeout(() => this.playSynth(f, 'sine', 0.4, 0.1), i * 120);
                });
            } catch(e) {}
        },

        alarmSound() {
            try {
                this.initContext();
                const now = this.ctx.currentTime;
                for (let j = 0; j < 3; j++) {
                    setTimeout(() => {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                        osc.frequency.linearRampToValueAtTime(1000, this.ctx.currentTime + 0.15);
                        osc.frequency.linearRampToValueAtTime(800, this.ctx.currentTime + 0.3);
                        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                        osc.connect(gain);
                        gain.connect(this.ctx.destination);
                        osc.start();
                        osc.stop(this.ctx.currentTime + 0.35);
                    }, j * 350);
                }
            } catch(e) {}
        },

        speakBilingual(es, en) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            
            const uEs = new SpeechSynthesisUtterance(es);
            uEs.lang = 'es-ES';
            uEs.rate = 0.95;
            
            uEs.onend = () => {
                const uEn = new SpeechSynthesisUtterance(en);
                uEn.lang = 'en-US';
                uEn.rate = 0.95;
                window.speechSynthesis.speak(uEn);
            };
            window.speechSynthesis.speak(uEs);
        }
    };

    // Country configuration
    const COUNTRY_ID = 'mexico';
    const COUNTRY_NAME_ES = 'México';
    const COUNTRY_NAME_EN = 'Mexico';
    const ALARM_TEXT_ES = '¡Alarma de México!';
    const ALARM_TEXT_EN = 'Mexico Alarm!';

    function speakCountry() {
        AudioController.speakBilingual(COUNTRY_NAME_ES, COUNTRY_NAME_EN);
    }

    function triggerAlarm() {
        AudioController.alarmSound();
        setTimeout(() => {
            AudioController.speakBilingual(ALARM_TEXT_ES, ALARM_TEXT_EN);
        }, 600);
    }

        let currentColor = null;
        let activeColorName = null;
        const brush = document.getElementById('brush-cursor');
        const sections = document.querySelectorAll('.flag-section');
        const flagContainer = document.getElementById('flag-container');
        
        // Custom Brush Logic
        document.addEventListener('mousemove', (e) => {
            brush.style.left = (e.clientX - 10) + 'px';
            brush.style.top = (e.clientY - 40) + 'px';
        });

        let isPainting = false;

        function handleInput(e) {
            const point = e.touches ? e.touches[0] : e;
            const target = document.elementFromPoint(point.clientX, point.clientY);
            if (target && target.closest('.flag-section')) {
                const section = target.closest('.flag-section');
                paintSection(section, point.clientX, point.clientY);
            }
        }

        flagContainer.addEventListener('mousedown', () => isPainting = true);
        flagContainer.addEventListener('touchstart', (e) => { 
            isPainting = true; 
            handleInput(e); 
        });
        
        window.addEventListener('mouseup', () => isPainting = false);
        window.addEventListener('touchend', () => isPainting = false);
        
        flagContainer.addEventListener('mousemove', (e) => {
            if (isPainting) handleInput(e);
        });
        flagContainer.addEventListener('touchmove', (e) => {
            if (isPainting) {
                e.preventDefault();
                handleInput(e);
            }
        }, { passive: false });

        const CORRECT_ANSWERS = {
            'left': 'green',
            'middle': 'white',
            'right': 'red'
        };

        let paintedState = {
            'left': null,
            'middle': null,
            'right': null
        };

        function selectColor(hex, name) {
            currentColor = hex;
            activeColorName = name;
            
            // Tactile UI update
            ['green', 'white', 'red'].forEach(c => {
                const btn = document.getElementById(`bucket-${c}`).firstElementChild;
                btn.classList.remove('active-paint-green', 'active-paint-white', 'active-paint-red');
            });

            const bucket = document.getElementById(`bucket-${name}`).firstElementChild;
            bucket.classList.add(`active-paint-${name}`);
            
            brush.style.color = hex;
            
            const labels = {
                'green': 'Verde... Green',
                'white': 'Blanco... White',
                'red': 'Rojo... Red'
            };
            AudioController.speakBilingual(labels[name].split('...')[0].trim(), labels[name].split('...')[1].trim());
        }

        function paintSection(section, x, y) {
            if (!currentColor) {
                shakeBuckets();
                return;
            }

            const sectionName = section.getAttribute('data-section');
            const correctColor = CORRECT_ANSWERS[sectionName];
            const rect = section.getBoundingClientRect();
            const offsetX = x - rect.left;
            const offsetY = y - rect.top;

            if (activeColorName === correctColor) {
                if (paintedState[sectionName] !== activeColorName) {
                    // Perform fill animation
                    const filler = document.createElement('div');
                    filler.className = 'paint-fill animate-paint';
                    filler.style.backgroundColor = currentColor;
                    filler.style.width = '100px';
                    filler.style.height = '100px';
                    filler.style.left = (offsetX - 50) + 'px';
                    filler.style.top = (offsetY - 50) + 'px';
                    section.appendChild(filler);

                    paintedState[sectionName] = activeColorName;

                    setTimeout(() => {
                        section.style.backgroundColor = currentColor;
                        section.querySelector('span').style.display = 'none';
                        createSparkles(section, x, y);
                        AudioController.speakBilingual('¡Correcto!', 'Correct!');
                        AudioController.sparkleSound();
                        checkWin();
                    }, 400);
                }
            } else {
                // Wrong color: Boing and shake
                if (!section.classList.contains('shaking')) {
                    AudioController.boing();
                    section.classList.add('shaking');
                    section.animate([
                        { transform: 'translateX(0)' },
                        { transform: 'translateX(-10px)' },
                        { transform: 'translateX(10px)' },
                        { transform: 'translateX(0)' }
                    ], { duration: 200, iterations: 2 });
                    setTimeout(() => section.classList.remove('shaking'), 400);
                }
            }
        }

        function createSparkles(parent, x, y) {
            const rect = parent.getBoundingClientRect();
            for (let i = 0; i < 8; i++) {
                const sparkle = document.createElement('span');
                sparkle.className = 'material-symbols-outlined sparkle !text-3xl';
                sparkle.innerHTML = 'star';
                sparkle.style.left = (x - rect.left + (Math.random() - 0.5) * 100) + 'px';
                sparkle.style.top = (y - rect.top + (Math.random() - 0.5) * 100) + 'px';
                sparkle.style.animationDelay = (Math.random() * 0.3) + 's';
                parent.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1000);
            }
        }

        function shakeBuckets() {
            document.querySelectorAll('footer button div').forEach(b => {
                b.animate([
                    { transform: 'rotate(0)' },
                    { transform: 'rotate(-10deg)' },
                    { transform: 'rotate(10deg)' },
                    { transform: 'rotate(0)' }
                ], { duration: 200, iterations: 2 });
            });
        }

        function checkWin() {
            const isWin = Object.keys(CORRECT_ANSWERS).every(key => paintedState[key] === CORRECT_ANSWERS[key]);
            if (isWin) {
                const toast = document.getElementById('success-message');
                toast.classList.remove('-translate-y-20', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');
                AudioController.victory();
                
                setTimeout(() => {
                    window.location.href = `../celebration_reward/index.html?country=${COUNTRY_ID}`;
                }, 2000);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            selectColor('#2b6c00', 'green');
        });
        
</script>
