<script>
        // ── AUDIO SYSTEM ──────────────────────────────────────────
        const AudioController = {
            ctx: null,
            initContext() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            playSynth(freq, type, dur, vol) {
                try {
                    this.initContext();
                    const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
                    osc.type = type; osc.frequency.value = freq;
                    g.gain.setValueAtTime(vol, this.ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
                    osc.connect(g); g.connect(this.ctx.destination);
                    osc.start(); osc.stop(this.ctx.currentTime + dur + 0.05);
                } catch(e) {}
            },
            boing() { this.playSynth(150,'sine',0.3,0.2); },
            sparkle() { [880,1100,1320].forEach((f,i)=>setTimeout(()=>this.playSynth(f,'triangle',0.15,0.07),i*60)); },
            victory() { [261.63,329.63,392,523.25,659.25,783.99,1046.5].forEach((f,i)=>setTimeout(()=>this.playSynth(f,'sine',0.4,0.1),i*120)); },
            alarm() {
                try {
                    this.initContext(); const c=this.ctx;
                    for(let i=0;i<3;i++){ setTimeout(()=>{ const o=c.createOscillator(),g=c.createGain(); o.type='sawtooth'; o.frequency.setValueAtTime(800,c.currentTime); o.frequency.linearRampToValueAtTime(1000,c.currentTime+0.15); o.frequency.linearRampToValueAtTime(800,c.currentTime+0.3); g.gain.setValueAtTime(0.1,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3); o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+0.35); },i*350); }
                } catch(e) {}
            },
            speakBilingual(es, en) {
                if (!('speechSynthesis' in window)) return;
                this.initContext();
                try { speechSynthesis.cancel(); } catch(e) {}
                setTimeout(() => {
                    const u = new SpeechSynthesisUtterance(es); u.lang='es-ES'; u.rate=0.95;
                    u.onend = () => { const u2=new SpeechSynthesisUtterance(en); u2.lang='en-US'; u2.rate=0.95; speechSynthesis.speak(u2); };
                    speechSynthesis.speak(u);
                }, 80);
            }
        };
        function speakCountry() { AudioController.speakBilingual('China','China'); }
        function triggerAlarm() { AudioController.alarm(); setTimeout(()=>AudioController.speakBilingual('¡Alarma de China!','China Alarm!'),750); }

        let currentColor = '#ba1a1a';
        let activeSelection = 'rojo';

        function selectColor(color, name) {
            currentColor = color;
            activeSelection = name;
            
            // Remove active styles
            document.querySelectorAll('[id^="btn-"]').forEach(btn => {
                btn.classList.remove('ring-4', 'ring-primary-container');
            });
            
            // Add active style to selected
            document.getElementById(`btn-${name}`).classList.add('ring-4', 'ring-primary-container');
            
            console.log('Selected color:', name);
        }

        function paintElement(id) {
            const el = document.getElementById(id);
            el.style.fill = currentColor;
            el.style.stroke = 'none';
            
            checkProgress();
        }

        function playAudio(text) {
            const labels = { 'China':['China','China'], 'Rojo':['Rojo','Red'], 'Amarillo':['Amarillo','Yellow'] };
            const pair = labels[text] || [text, text];
            AudioController.speakBilingual(pair[0], pair[1]);
        }

        function checkProgress() {
            const field = document.getElementById('field').style.fill;
            const s1 = document.getElementById('star1').style.fill;
            const s2 = document.getElementById('star2').style.fill;
            const s3 = document.getElementById('star3').style.fill;
            const s4 = document.getElementById('star4').style.fill;
            const s5 = document.getElementById('star5').style.fill;

            // Simplified check: Field is red and stars are yellow
            // Using RGB because style.fill returns rgb()
            const isRed = (c) => c === 'rgb(186, 26, 26)' || c === '#ba1a1a';
            const isYellow = (c) => c === 'rgb(252, 204, 0)' || c === '#fccc00';

            if (isRed(field) && isYellow(s1) && isYellow(s2) && isYellow(s3) && isYellow(s4) && isYellow(s5)) {
                showCelebration();
            }
        }

        function showCelebration() {
            const celeb = document.getElementById('celebration');
            celeb.classList.remove('hidden');
            setTimeout(() => {
                celeb.classList.add('scale-100');
            }, 10);
            
            // Haptic-like visual shake for buttons
            document.body.style.overflow = 'hidden';
            playAudio("¡Increíble! ¡Has completado la bandera!");
        }

        // Initialize first color
        window.onload = () => {
            selectColor('#ba1a1a', 'rojo');
        }
    </script>
