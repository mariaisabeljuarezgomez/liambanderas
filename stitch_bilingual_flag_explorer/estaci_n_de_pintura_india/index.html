<script>const COUNTRY_ID = 'india';

        // ── AUDIO SYSTEM ──────────────────────────────────────────
        const AudioController = {
            ctx: null,
            initContext() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            alarm() {
                try {
                    this.initContext();
                    const c = this.ctx;
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            const o = c.createOscillator(), g = c.createGain();
                            o.type = 'sawtooth';
                            o.frequency.setValueAtTime(800, c.currentTime);
                            o.frequency.linearRampToValueAtTime(1000, c.currentTime + 0.15);
                            o.frequency.linearRampToValueAtTime(800, c.currentTime + 0.3);
                            g.gain.setValueAtTime(0.1, c.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
                            o.connect(g); g.connect(c.destination);
                            o.start(); o.stop(c.currentTime + 0.35);
                        }, i * 350);
                    }
                } catch(e) {}
            },
            speakBilingual(es, en) {
                if (!('speechSynthesis' in window)) return;
                this.initContext();
                try { speechSynthesis.cancel(); } catch(e) {}
                setTimeout(() => {
                    const u = new SpeechSynthesisUtterance(es);
                    u.lang = 'es-ES';
                    u.rate = 0.95;
                    u.onend = () => {
                        const u2 = new SpeechSynthesisUtterance(en);
                        u2.lang = 'en-US';
                        u2.rate = 0.95;
                        speechSynthesis.speak(u2);
                    };
                    speechSynthesis.speak(u);
                }, 80);
            }
        };
        function speakCountry() { AudioController.speakBilingual('India', 'India'); }
        function triggerAlarm() { AudioController.alarm(); setTimeout(() => AudioController.speakBilingual('¡Alarma de India!', 'India Alarm!'), 750); }

        let selectedColor = null;
        let selectedHex = null;
        let paintedParts = {
            'stripe-top': false,
            'stripe-middle': false,
            'stripe-bottom': false,
            'chakra': false
        };

        const correctColors = {
            'stripe-top': 'naranja',
            'stripe-middle': 'blanco',
            'stripe-bottom': 'verde',
            'chakra': 'blanco' // Chakra is technically blue, but for this simplified UI we focus on the tri-color and general Blanco background. 
            // Simplified logic: Chakra is painted separately if needed, but let's assume it should be blue if we had a blue button.
            // Let's adjust to auto-color chakra blue when the middle is white for a better user experience.
        };

        function selectColor(colorName, hex) {
            selectedColor = colorName;
            selectedHex = hex;
            
            // UI feedback for selection
            ['naranja', 'blanco', 'verde'].forEach(c => {
                const check = document.getElementById(`check-${c}`);
                if (c === colorName) {
                    check.classList.remove('hidden');
                } else {
                    check.classList.add('hidden');
                }
            });

            // Sparkle effect on button
            createParticles(event.pageX, event.pageY);
        }

        function paintArea(id) {
            if (!selectedHex) {
                alert("¡Primero selecciona un color abajo!");
                return;
            }

            const area = document.getElementById(id);
            area.style.backgroundColor = selectedHex;
            area.innerHTML = ''; // Clear label text
            
            if (id === 'chakra' && selectedColor === 'blanco') {
                // Special case for chakra, let's make it look authentic
                area.style.borderColor = '#000080';
                area.innerHTML = '<span class="material-symbols-outlined text-6xl text-[#000080]" style="font-variation-settings: \'opsz\' 48">settings</span>';
            }

            paintedParts[id] = true;
            updateProgress();
        }

        function updateProgress() {
            const total = Object.keys(paintedParts).length;
            const painted = Object.values(paintedParts).filter(v => v).length;
            const percentage = Math.round((painted / total) * 100);
            
            document.getElementById('progress-bar').style.width = percentage + '%';
            document.getElementById('progress-text').innerText = percentage + '%';

            if (percentage === 100) {
                setTimeout(showSuccess, 500);
            }
        }

        function showSuccess() {
            const modal = document.getElementById('success-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.querySelector('div').classList.remove('scale-90');
                modal.querySelector('div').classList.add('scale-100');
            }, 10);
            
            // Confetti burst
            for(let i=0; i<50; i++) {
                setTimeout(() => createParticles(window.innerWidth/2, window.innerHeight/2), i * 20);
            }
        }

        function playAudio(text) {
            const labels = { 'India':['India','India'], 'Naranja':['Naranja','Orange'], 'Blanco':['Blanco','White'], 'Verde':['Verde','Green'] };
            const pair = labels[text] || [text, text];
            AudioController.speakBilingual(pair[0], pair[1]);
        }

        function createParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'confetti fixed z-[100] pointer-events-none';
                p.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 50%)`;
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                document.body.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 2 + Math.random() * 4;
                const dx = Math.cos(angle) * velocity;
                const dy = Math.sin(angle) * velocity;
                
                let posX = x;
                let posY = y;
                let opacity = 1;

                const animate = () => {
                    posX += dx;
                    posY += dy;
                    opacity -= 0.02;
                    p.style.left = posX + 'px';
                    p.style.top = posY + 'px';
                    p.style.opacity = opacity;

                    if (opacity > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        p.remove();
                    }
                };
                requestAnimationFrame(animate);
            }
        }
    
        
        function compareColor(el, expected) {
            if (!el) return false;
            const clean = (s) => s.replace(/\s+/g, '').toLowerCase();
            const exp = clean(expected);
            
            const bg = el.style.backgroundColor;
            if (bg) {
                if (clean(bg).includes(exp)) return true;
                if (exp.startsWith('#') && exp.length === 7) {
                    const r = parseInt(exp.slice(1, 3), 16);
                    const g = parseInt(exp.slice(3, 5), 16);
                    const b = parseInt(exp.slice(5, 7), 16);
                    if (clean(bg).includes(`rgb(${r},${g},${b})`)) return true;
                }
            }
            
            const fill = el.getAttribute('fill');
            if (fill) {
                if (clean(fill).includes(exp)) return true;
                if (exp.startsWith('#') && exp.length === 7) {
                    const r = parseInt(exp.slice(1, 3), 16);
                    const g = parseInt(exp.slice(3, 5), 16);
                    const b = parseInt(exp.slice(5, 7), 16);
                    if (clean(fill).includes(`rgb(${r},${g},${b})`)) return true;
                }
            }
            
            const sFill = el.style.fill;
            if (sFill) {
                if (clean(sFill).includes(exp)) return true;
                if (exp.startsWith('#') && exp.length === 7) {
                    const r = parseInt(exp.slice(1, 3), 16);
                    const g = parseInt(exp.slice(3, 5), 16);
                    const b = parseInt(exp.slice(5, 7), 16);
                    if (clean(sFill).includes(`rgb(${r},${g},${b})`)) return true;
                }
            }
            
            const classes = el.className;
            if (classes && typeof classes === 'string') {
                if (clean(classes).includes('bg-[' + exp + ']') || clean(classes).includes('bg-' + exp)) return true;
            }
            
            return false;
        }

        function checkCompletion() {
            const top = document.getElementById('stripe-top');
            const mid = document.getElementById('stripe-middle');
            const bot = document.getElementById('stripe-bottom');
            const chakra = document.getElementById('chakra');
            const allPainted = top && mid && bot && chakra && top.style.backgroundColor && mid.style.backgroundColor && bot.style.backgroundColor && chakra.style.backgroundColor;
            const isCorrect = allPainted && compareColor(top, '#FF9933') && compareColor(mid, '#FFFFFF') && compareColor(bot, '#138808') && compareColor(chakra, '#FFFFFF');
            
            if (isCorrect) {
                AudioController.speakBilingual('¡Lo lograste! ¡Bandera completa!', 'You did it! Flag complete!');
                const canvas = document.getElementById('flag-canvas') || document.getElementById('paintingCanvas') || document.getElementById('flag-container') || document.getElementById('flag-svg') || document.getElementById('australia-flag-svg');
                if (canvas) canvas.classList.add('celebration');
                setTimeout(() => {
                    window.location.href = `../celebration_reward/index.html?country=${COUNTRY_ID}`;
                }, 2000);
            } else if (allPainted) {
                AudioController.speakBilingual('¡Casi! Sigue intentando con los colores correctos.', 'Almost! Keep trying with the correct colors.');
            } else {
                AudioController.speakBilingual('¡Sigue pintando!', 'Keep painting!');
            }
        }

        // Auto-painted observer to dynamically track coloring
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                    const target = mutation.target;
                    if (target.style.backgroundColor && target.style.backgroundColor !== 'transparent' && target.style.backgroundColor !== '') {
                        target.dataset.painted = 'true';
                    } else {
                        target.removeAttribute('data-painted');
                    }
                }
            });
        });
        const canvas = document.getElementById('flag-canvas');
        if (canvas) {
            observer.observe(canvas, {
                attributes: true,
                subtree: true,
                attributeFilter: ['style']
            });
        }
        </script>
