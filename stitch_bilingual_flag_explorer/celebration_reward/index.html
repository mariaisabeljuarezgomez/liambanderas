<style>
        .material-symbols-outlined {

        /* Tactile Shadows */
        .btn-primary-tactile {
            box-shadow: 0 6px 0 0 #004b71;
            transition: all 0.1s ease;
        }
        .btn-primary-tactile:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 0 #004b71;
        }
        
        .btn-secondary-tactile {
            box-shadow: 0 6px 0 0 #bec8d3;
            transition: all 0.1s ease;
        }
        .btn-secondary-tactile:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 0 #bec8d3;
        }

        .card-tactile {
            box-shadow: 0 8px 0 0 #dee3e9;
        }

        /* Waving Animation */
        @keyframes wave {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(2deg) translateY(-2px); }
            75% { transform: rotate(-2deg) translateY(2px); }
            100% { transform: rotate(0deg); }
        }
        .animate-wave {
            animation: wave 3s ease-in-out infinite;
        }

        /* Rays Background */
        .celebration-rays {
            background: radial-gradient(circle, #fccc00 0%, #ffe084 100%);
            overflow: hidden;
            position: relative;
        }
        .ray {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            transform-origin: 0 50%;
            animation: rotate-rays 20s linear infinite;
        }
        @keyframes rotate-rays {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Floating Confetti */
        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 2px;
            animation: fall linear forwards;
            z-index: 5;
        }
        @keyframes fall {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tw-translate-x, 0), 100vh) rotate(720deg); opacity: 0; }
        }

        /* Stamp Pop effect */
        @keyframes stamp-pop {
            0% { transform: scale(3) rotate(-20deg); opacity: 0; }
            80% { transform: scale(0.9) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .animate-stamp {
            animation: stamp-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.5s;
            opacity: 0;
        }

        /* Sparkle System */
        .sparkle {
            position: absolute;
            pointer-events: none;
            animation: sparkle-anim 1s linear forwards;
            z-index: 40;
        }
        @keyframes sparkle-anim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }

            nameEs: 'Alemania',
            nameEn: 'Germany',
            flagUrl: 'https://lh3.googleusercontent.com/aida-public/AB6AXuCrR-U-sV8DFt8fcTMWlJQQdiwuJ4E6vcZgom1j2tHsRXCxlquZ4SS9aYklk5DCFpy5CdxAj6hLKRkocQDYC95DoVykseHcicNKvJk0TBcvhNqGYKtqQ_XOxwLxvU4vMdOO2n543gZZIzu0BclWPN0gZkrB8JerFGpQfVeOPm5DgRrMy1ni1vNAfAaD1zAvFO4_WSsCmGqK7ypcKo0sYbWjzWsYdUQQK-2jBWeG8kNgRod1dT4YZEJlECAoqQkYxrk7bLoOuBOyfF8',
            folder: 'estaci_n_de_pintura_alemania',
            nextCountry: 'australia'
        },
        australia: {
            id: 'australia',
            nameEs: 'Australia',
            nameEn: 'Australia',
            flagUrl: 'https://lh3.googleusercontent.com/aida-public/AB6AXuBGVlepViONNNNR23w47mX_yNdxvrEPZSm-CcpBfN7v0QIdltNnfbGu5yWP6cqdDNsWFLCFe3H54FKvOh3YBUUCZ04moS2fS8KFxw-09xVHItwhxDF9v2fk_gYHAv14Cm5DOf2b9SdEeaV6EzrQE5Rud19BtY4ZtDdFJJRuM7K4WQ-PSslbrqa85z5MOGiXKcfBrEg8SCRly-EKmP5ywW3N5l4zyRi81He8wapohNHlqt6D-ms1vAu8g51V1LriNG1JmdorMMf6Txs',
            folder: 'estaci_n_de_pintura_australia',
            nextCountry: 'reward_level_1'
        }
    };

    // Get current country from URL
    const urlParams = new URLSearchParams(window.location.search);
    const countryParam = urlParams.get('country') || 'mexico';
    const currentCountry = COUNTRY_DATA[countryParam] || COUNTRY_DATA.mexico;

    // Set completion flag
    localStorage.setItem(currentCountry.id + '_completed', 'true');

    // Update UI elements dynamically
    document.title = `Flag Explorer - ${currentCountry.nameEn} Celebration`;
    
    const flagImg = document.querySelector('#flag-card img');
    if (flagImg) flagImg.src = currentCountry.flagUrl;

    const flagH1 = document.querySelector('#flag-card h1');
    if (flagH1) {
        flagH1.innerHTML = `¡Lo lograste!<br><span class="text-body-md font-medium opacity-80">You Did It!</span>`;
    }

    const flagP = document.querySelector('#flag-card p');
    if (flagP) {
        flagP.innerHTML = `¡${currentCountry.nameEs} completado!<br><span class="text-label-bold opacity-70">${currentCountry.nameEn} is Completed!</span>`;
    }

    const stampText = document.querySelector('.animate-stamp span.text-tertiary-container');
    if (stampText) {
        stampText.textContent = currentCountry.nameEs.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    // Generate Rays
    for (let i = 0; i < 12; i++) {
        const ray = document.createElement('div');
        ray.className = 'ray';
        ray.style.transform = `translate(-50%, -50%) rotate(${i * 30}deg)`;
        raysContainer.appendChild(ray);
    }

    // Particle Systems
    function createConfetti(count = 50, burst = false) {
        for (let i = 0; i < count; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            
            const startX = burst ? 50 : Math.random() * 100;
            const startY = burst ? 50 : -5;
            
            confetti.style.left = startX + 'vw';
            confetti.style.top = startY + (burst ? 'vh' : 'px');
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            const duration = (Math.random() * 3 + 2);
            confetti.style.animationDuration = duration + 's';
            
            if (burst) {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100;
                confetti.style.setProperty('--tw-translate-x', Math.cos(angle) * distance + 'px');
            }
            
            confettiContainer.appendChild(confetti);
            setTimeout(() => confetti.remove(), duration * 1000);
        }
    }

    function createSparkle(x, y) {
        const sparkle = document.createElement('span');
        sparkle.className = 'material-symbols-outlined sparkle text-secondary-container';
        sparkle.innerText = 'star';
        sparkle.style.left = x + 'px';
        sparkle.style.top = y + 'px';
        sparkle.style.fontSize = (Math.random() * 20 + 10) + 'px';
        sparkle.style.fontVariationSettings = "'FILL' 1";
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1000);
    }

    function flagBurst() {
        const rect = sparkleOrigin.getBoundingClientRect();
        for(let i=0; i<20; i++) {
            setTimeout(() => {
                const rx = rect.left + Math.random() * rect.width;
                const ry = rect.top + Math.random() * rect.height;
                createSparkle(rx, ry);
            }, i * 50);
        }
    }

    // Bilingual speaking function
    function speakBilingual(es, en) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const uEs = new SpeechSynthesisUtterance(es);
        uEs.lang = 'es-ES';
        uEs.rate = 1.0;
        uEs.onend = () => {
            const uEn = new SpeechSynthesisUtterance(en);
            uEn.lang = 'en-US';
            uEn.rate = 1.0;
            window.speechSynthesis.speak(uEn);
        };
        window.speechSynthesis.speak(uEs);
    }

    // Audio System
    function playCelebration() {
        speakBilingual(`¡Lo lograste! ¡${currentCountry.nameEs} completado!`, `You did it! ${currentCountry.nameEn} completed!`);
    }

    // Initialization
    window.addEventListener('load', () => {
        setTimeout(() => {
            createConfetti(100, true);
            flagBurst();
            playCelebration();
        }, 300);

        setInterval(() => createConfetti(15), 4000);
    });

    // Tactile Click Feedback
    document.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', (e) => {
            if (window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }
            createSparkle(e.clientX, e.clientY);
        });
    });

    // Manual Sound Toggle
    document.getElementById('speaker-toggle').addEventListener('click', () => {
        playCelebration();
    });

    // Wire Buttons
    const actionButtons = document.querySelectorAll('main button, main a');
    actionButtons.forEach(btn => {
        const text = btn.textContent || btn.innerText;
        if (text.includes('Siguiente Bandera') || text.includes('Next Flag')) {
            btn.addEventListener('click', () => {
                const level1Keys = ['mexico', 'usa', 'canada', 'france', 'italy', 'spain', 'brazil', 'japan', 'germany', 'australia'];
                const allCompleted = level1Keys.every(k => localStorage.getItem(k + '_completed') === 'true');
                
                if (allCompleted) {
                    window.location.href = '../recompensa_de_nivel_1_explorador_del_mundo/index.html';
                } else {
                    // Find the next uncompleted flag starting from the current flag
                    const currentIdx = level1Keys.indexOf(currentCountry.id);
                    let nextIdx = (currentIdx + 1) % level1Keys.length;
                    let found = false;
                    for (let i = 0; i < level1Keys.length; i++) {
                        const checkId = level1Keys[nextIdx];
                        if (localStorage.getItem(checkId + '_completed') !== 'true') {
                            window.location.href = `../${COUNTRY_DATA[checkId].folder}/index.html`;
                            found = true;
                            break;
                        }
                        nextIdx = (nextIdx + 1) % level1Keys.length;
                    }
                    if (!found) {
                        window.location.href = '../world_map_hub/index.html';
                    }
                }
            });
        } else if (text.includes('Volver al Mapa') || text.includes('Back to Map')) {
            btn.addEventListener('click', () => {
                window.location.href = '../world_map_hub/index.html';
            });
        }
    });
</script>
