<style>
        body { font-family: 'Quicksand', sans-serif; -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        
        .chunky-button-primary {
            @apply transition-all duration-75 active:translate-y-1;
            box-shadow: 0 4px 0 0 #004b71;
        }
        .chunky-button-primary:active { box-shadow: 0 0 0 0 #004b71; }

        .chunky-button-secondary {
            @apply transition-all duration-75 active:translate-y-1;
            box-shadow: 0 4px 0 0 #bec8d3;
        }
        .chunky-button-secondary:active { box-shadow: 0 0 0 0 #bec8d3; }

        .chunky-bucket {
            @apply transition-all duration-100 active:scale-95;
            box-shadow: 0 8px 0 0 rgba(0,0,0,0.1);
        }

        .pulse-audio {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }

        .canvas-area {
            background-image: radial-gradient(#dee3e9 1px, transparent 1px);

        .selected-color-outline { outline: 4px solid #2bb1ff; outline-offset: 4px; }

<body class="bg-surface text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface flex justify-between items-center px-container-margin py-unit h-touch-target-min z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-headline-md-mobile" data-icon="language">language</span>
<h1 class="font-headline-md text-headline-md-mobile text-primary">Explorador de Banderas</h1>
</div>
<button aria-label="Ajustes de sonido" class="w-touch-target-min h-touch-target-min flex items-center justify-center hover:bg-surface-container-high rounded-full active:translate-y-1 transition-transform">
<span class="material-symbols-outlined text-primary" data-icon="volume_up">volume_up</span>
</button>
<button aria-label="¡Alarma! / Sound Alarm" class="w-touch-target-min h-touch-target-min flex items-center justify-center bg-secondary-container text-on-secondary-container rounded-full active:translate-y-1 transition-transform shadow-[0_2px_0_0_#6d5700] ml-2" onclick="triggerAlarm()"><span class="material-symbols-outlined" data-icon="notifications_active">notifications_active</span></button></header>
<!-- Main Content: Flag Station -->
<main class="flex-1 flex flex-col items-center px-container-margin py-unit overflow-y-auto pb-32">
<!-- Header Section -->
<div class="w-full flex flex-col items-center mb-6">
<div class="flex items-center gap-4">
<div class="text-center">
<h2 class="font-headline-lg text-headline-lg-mobile text-on-background m-0">Brasil</h2>
<p class="font-body-md text-body-md text-on-surface-variant opacity-70">Brazil</p>
</div>
<button class="pulse-audio w-[64px] h-[64px] bg-secondary-container rounded-full flex items-center justify-center chunky-button-secondary border-4 border-white" onclick="speakCountry()">
<span class="material-symbols-outlined text-on-secondary-container text-[32px]" data-icon="volume_up">volume_up</span>
</button>
</div>
</div>
<!-- Interactive Flag Canvas -->
<div class="w-full max-w-[500px] aspect-[3/2] bg-white rounded-lg p-card-padding shadow-inner relative canvas-area border-4 border-surface-container-highest flex items-center justify-center overflow-hidden">
<svg class="w-full h-full drop-shadow-lg" id="flag-svg" viewBox="0 0 300 200">
<!-- Green Field (Background) -->
<rect class="flag-path cursor-pointer" height="200" id="part-green" onclick="paintPart('part-green')" width="300" x="0" y="0"></rect>
<!-- Yellow Rhombus -->
<polygon class="flag-path cursor-pointer" id="part-yellow" onclick="paintPart('part-yellow')" points="150,20 280,100 150,180 20,100"></polygon>
<!-- Blue Circle -->
<circle class="flag-path cursor-pointer" cx="150" cy="100" id="part-blue" onclick="paintPart('part-blue')" r="45"></circle>
</svg>
<!-- Guide Overlay -->
<div class="absolute pointer-events-none border-4 border-dashed border-primary/40 rounded-xl px-6 py-4 bg-white/80 animate-bounce" id="paint-hint">
<p class="font-label-bold text-primary flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="brush">brush</span>
                    ¡PINTA AQUÍ!
                </p>
</div>
</div>
<!-- Palette Section -->
<div class="w-full mt-auto pt-8 flex flex-col items-center">
<p class="font-label-bold text-on-surface-variant mb-4">ELIGE UN COLOR</p>

</button>

</div>
<!-- Color: Amarillo -->
<div class="flex flex-col items-center gap-2">

<div class="flex items-center gap-1 bg-surface-container-high rounded-full px-3 py-1">

<!-- Color: Azul -->

<span class="font-label-bold text-on-surface-variant">Azul</span>

</div>

</div>

</main>

<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="font-label-bold text-label-bold">Explorar</span>
</button>
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-xl px-gutter py-1 shadow-[0_4px_0_0_#6d5700] active:translate-y-1 active:shadow-none transition-all duration-75">
<span class="material-symbols-outlined" data-icon="import_contacts">import_contacts</span>
<span class="font-label-bold text-label-bold">Pasaporte</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-gutter py-1 hover:bg-surface-container-high rounded-full">
<span class="material-symbols-outlined" data-icon="sports_esports">sports_esports</span>
<span class="font-label-bold text-label-bold">Jugar</span>
</button>

<script>

    // Audio Controller Module
    const AudioController = {
        ctx: null,
        
        initContext() {
            if (!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (this.ctx && this.ctx.state === 'suspended') {
                this.ctx.resume();
            }
        },

        playSynth(freq, type, duration = 0.2, volume = 0.1) {
            try {
                this.initContext();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(volume, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            } catch(e) {
                console.log(e);
            }
        },

        boing() {
            this.playSynth(150, 'sine', 0.3, 0.25);
            this.playSynth(100, 'square', 0.1, 0.05);
        },

        sparkleSound() {
            try {
                this.initContext();
                const now = this.ctx.currentTime;
                [880, 1100, 1320].forEach((f, i) => {
                    setTimeout(() => {
                        this.playSynth(f, 'triangle', 0.15, 0.05);
                    }, i * 60);
                });
            } catch(e) {}
        },

        victory() {
            try {
                this.initContext();
                const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
                notes.forEach((f, i) => {
                    setTimeout(() => this.playSynth(f, 'sine', 0.4, 0.1), i * 120);
                });
            } catch(e) {}
        },

        alarmSound() {
            try {
                this.initContext();
                const now = this.ctx.currentTime;
                for (let j = 0; j < 3; j++) {
                    setTimeout(() => {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                        osc.frequency.linearRampToValueAtTime(1000, this.ctx.currentTime + 0.15);
                        osc.frequency.linearRampToValueAtTime(800, this.ctx.currentTime + 0.3);
                        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                        osc.connect(gain);
                        gain.connect(this.ctx.destination);
                        osc.start();
                        osc.stop(this.ctx.currentTime + 0.35);
                    }, j * 350);
                }
            } catch(e) {}
        },

        speakBilingual(es, en) {
            if (!('speechSynthesis' in window)) return;
            this.initContext();
            try { window.speechSynthesis.cancel(); } catch(e) {}
            
            setTimeout(() => {
            const uEs = new SpeechSynthesisUtterance(es);
            uEs.lang = 'es-ES';
            uEs.rate = 0.95;
            
            uEs.onend = () => {
                const uEn = new SpeechSynthesisUtterance(en);
                uEn.lang = 'en-US';
                uEn.rate = 0.95;
                window.speechSynthesis.speak(uEn);
            };
            window.speechSynthesis.speak(uEs);
            }, 80);
        }
    };

    // Country configuration
    const COUNTRY_ID = 'brazil';
    const COUNTRY_NAME_ES = 'Brasil';
    const COUNTRY_NAME_EN = 'Brazil';
    const ALARM_TEXT_ES = '¡Alarma de Brasil!';
    const ALARM_TEXT_EN = 'Brazil Alarm!';

    function speakCountry() {
        AudioController.speakBilingual(COUNTRY_NAME_ES, COUNTRY_NAME_EN);
    }

    function triggerAlarm() {
        AudioController.alarmSound();
        setTimeout(() => {
            AudioController.speakBilingual(ALARM_TEXT_ES, ALARM_TEXT_EN);
        }, 600);
    }

        let currentColor = null;
        let activeColorName = null;
        
        let paintedState = {
            'part-green': null,
            'part-yellow': null,
            'part-blue': null
        };

        const CORRECT_ANSWERS = {
            'part-green': 'green',
            'part-yellow': 'yellow',
            'part-blue': 'blue'
        };

        function selectColor(color, element, audioText) {
            currentColor = color;
            if (color === '#009739') activeColorName = 'green';
            if (color === '#fedf00') activeColorName = 'yellow';
            if (color === '#012169') activeColorName = 'blue';

            // UI Feedback for selection
            document.querySelectorAll('.color-bucket').forEach(b => b.classList.remove('selected-color-outline'));
            element.classList.add('selected-color-outline');
            
            // Remove the paint hint once a color is selected
            const hint = document.getElementById('paint-hint');
            if (hint) hint.classList.add('hidden');
            
            AudioController.speakBilingual(audioText.split(',')[0].trim(), audioText.split(',')[1].trim());
        }

        function paintPart(id) {
            if (!currentColor) {
                shakeBuckets();
                return;
            }

            const correctColorName = CORRECT_ANSWERS[id];
            if (activeColorName === correctColorName) {
                const part = document.getElementById(id);
                part.style.fill = currentColor;
                
                // Add a little pop animation
                part.classList.add('animate-ping');
                setTimeout(() => part.classList.remove('animate-ping'), 150);

                paintedState[id] = activeColorName;
                AudioController.speakBilingual('¡Correcto!', 'Correct!');
                AudioController.sparkleSound();
                checkFlagCompletion();
            } else {
                AudioController.boing();
                const part = document.getElementById(id);
                part.animate([
                    { transform: 'translateX(0px)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(0px)' }
                ], { duration: 200 });
            }
        }

        function shakeBuckets() {
            document.querySelectorAll('.color-bucket').forEach(btn => {
                btn.animate([
                    { transform: 'rotate(0)' },
                    { transform: 'rotate(-10deg)' },
                    { transform: 'rotate(10deg)' },
                    { transform: 'rotate(0)' }
                ], { duration: 200, iterations: 2 });
            });
        }

        function checkFlagCompletion() {
            const isWin = Object.keys(CORRECT_ANSWERS).every(key => paintedState[key] === CORRECT_ANSWERS[key]);
            if (isWin) {
                AudioController.victory();
                setTimeout(() => {
                    window.location.href = `../celebration_reward/index.html?country=${COUNTRY_ID}`;
                }, 2000);
            }
        }
        
</script>
