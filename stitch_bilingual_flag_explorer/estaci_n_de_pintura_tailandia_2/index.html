<script>const COUNTRY_ID = 'tailandia_2';

        // ── AUDIO SYSTEM ──────────────────────────────────────────
        const AudioController = {
            ctx: null,
            initContext() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            alarm() {
                try {
                    this.initContext();
                    const c = this.ctx;
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            const o = c.createOscillator(), g = c.createGain();
                            o.type = 'sawtooth';
                            o.frequency.setValueAtTime(800, c.currentTime);
                            o.frequency.linearRampToValueAtTime(1000, c.currentTime + 0.15);
                            o.frequency.linearRampToValueAtTime(800, c.currentTime + 0.3);
                            g.gain.setValueAtTime(0.1, c.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
                            o.connect(g); g.connect(c.destination);
                            o.start(); o.stop(c.currentTime + 0.35);
                        }, i * 350);
                    }
                } catch(e) {}
            },
            speakBilingual(es, en) {
                if (!('speechSynthesis' in window)) return;
                this.initContext();
                try { speechSynthesis.cancel(); } catch(e) {}
                setTimeout(() => {
                    const u = new SpeechSynthesisUtterance(es);
                    u.lang = 'es-ES';
                    u.rate = 0.95;
                    u.onend = () => {
                        const u2 = new SpeechSynthesisUtterance(en);
                        u2.lang = 'en-US';
                        u2.rate = 0.95;
                        speechSynthesis.speak(u2);
                    };
                    speechSynthesis.speak(u);
                }, 80);
            }
        };
        function speakCountry() { AudioController.speakBilingual('Tailandia', 'Thailand'); }
        function triggerAlarm() { AudioController.alarm(); setTimeout(() => AudioController.speakBilingual('¡Alarma de Tailandia!', 'Thailand Alarm!'), 750); }

        let currentColor = null;
        const correctPattern = ['#ba1a1a', '#ffffff', '#004163', '#ffffff', '#ba1a1a'];

        function selectColor(color, element) {
            currentColor = color;
            document.querySelectorAll('.color-well').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            
            const labels = { '#ba1a1a':['Rojo','Red'], '#ffffff':['Blanco','White'], '#004163':['Azul','Blue'] };
            const pair = labels[color] || ['Color', 'Color'];
            AudioController.speakBilingual(pair[0], pair[1]);
        }

        function paintStripe(stripe) {
            if (currentColor) {
                stripe.style.backgroundColor = currentColor;
                stripe.classList.remove('bg-white');
                
                // Interaction feedback
                stripe.animate([
                    { transform: 'scale(1)', opacity: 0.8 },
                    { transform: 'scale(1.02)', opacity: 1 },
                    { transform: 'scale(1)', opacity: 1 }
                ], { duration: 200 });
            }
        }

        function resetFlag() {
            const stripes = document.querySelectorAll('.flag-stripe');
            stripes.forEach(s => {
                s.style.backgroundColor = '#ffffff';
                s.classList.add('bg-white');
            });
        }

        function checkFlag() {
            const stripes = document.querySelectorAll('.flag-stripe');
            let isCorrect = true;
            
            stripes.forEach((stripe, index) => {
                const bg = stripe.style.backgroundColor;
                // Basic check logic (convert RGB to Hex for simplicity)
                if (!bg || bg === 'white' || bg === 'rgb(255, 255, 255)') {
                    isCorrect = false;
                }
            });

            if (isCorrect) {
                document.getElementById('success-modal').classList.remove('hidden');
                triggerConfetti();
            } else {
                alert("¡Casi! Sigue pintando hasta llenar todas las franjas.");
            }
        }

        function closeModal() {
            document.getElementById('success-modal').classList.add('hidden');
        }

        function triggerConfetti() {
            // Minimalist visual feedback for children
            console.log("Confetti triggered!");
        }

        // Initialize with first color
        window.onload = () => {
            selectColor('#ba1a1a', document.querySelector('.color-well'));
        }
    
        
        function compareColor(el, expected) {
            if (!el) return false;
            const clean = (s) => s.replace(/\s+/g, '').toLowerCase();
            const exp = clean(expected);
            
            const bg = el.style.backgroundColor;
            if (bg) {
                if (clean(bg).includes(exp)) return true;
                if (exp.startsWith('#') && exp.length === 7) {
                    const r = parseInt(exp.slice(1, 3), 16);
                    const g = parseInt(exp.slice(3, 5), 16);
                    const b = parseInt(exp.slice(5, 7), 16);
                    if (clean(bg).includes(`rgb(${r},${g},${b})`)) return true;
                }
            }
            
            const fill = el.getAttribute('fill');
            if (fill) {
                if (clean(fill).includes(exp)) return true;
                if (exp.startsWith('#') && exp.length === 7) {
                    const r = parseInt(exp.slice(1, 3), 16);
                    const g = parseInt(exp.slice(3, 5), 16);
                    const b = parseInt(exp.slice(5, 7), 16);
                    if (clean(fill).includes(`rgb(${r},${g},${b})`)) return true;
                }
            }
            
            const sFill = el.style.fill;
            if (sFill) {
                if (clean(sFill).includes(exp)) return true;
                if (exp.startsWith('#') && exp.length === 7) {
                    const r = parseInt(exp.slice(1, 3), 16);
                    const g = parseInt(exp.slice(3, 5), 16);
                    const b = parseInt(exp.slice(5, 7), 16);
                    if (clean(sFill).includes(`rgb(${r},${g},${b})`)) return true;
                }
            }
            
            const classes = el.className;
            if (classes && typeof classes === 'string') {
                if (clean(classes).includes('bg-[' + exp + ']') || clean(classes).includes('bg-' + exp)) return true;
            }
            
            return false;
        }

        function checkCompletion() {
            const stripes = Array.from(document.querySelectorAll('.flag-stripe'));
            const allPainted = stripes.length === 5 && stripes.every(s => s.style.backgroundColor && s.style.backgroundColor !== 'white' && s.style.backgroundColor !== 'rgb(255, 255, 255)');
            const isCorrect = allPainted && compareColor(stripes[0], '#ba1a1a') && compareColor(stripes[1], '#ffffff') && compareColor(stripes[2], '#006495') && compareColor(stripes[3], '#ffffff') && compareColor(stripes[4], '#ba1a1a');
            
            if (isCorrect) {
                AudioController.speakBilingual('¡Lo lograste! ¡Bandera completa!', 'You did it! Flag complete!');
                const canvas = document.getElementById('flag-canvas') || document.getElementById('paintingCanvas') || document.getElementById('flag-container') || document.getElementById('flag-svg') || document.getElementById('australia-flag-svg');
                if (canvas) canvas.classList.add('celebration');
                setTimeout(() => {
                    window.location.href = `../celebration_reward/index.html?country=${COUNTRY_ID}`;
                }, 2000);
            } else if (allPainted) {
                AudioController.speakBilingual('¡Casi! Sigue intentando con los colores correctos.', 'Almost! Keep trying with the correct colors.');
            } else {
                AudioController.speakBilingual('¡Sigue pintando!', 'Keep painting!');
            }
        }

        // Auto-painted observer to dynamically track coloring
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                    const target = mutation.target;
                    if (target.style.backgroundColor && target.style.backgroundColor !== 'transparent' && target.style.backgroundColor !== '') {
                        target.dataset.painted = 'true';
                    } else {
                        target.removeAttribute('data-painted');
                    }
                }
            });
        });
        const canvas = document.getElementById('flag-canvas');
        if (canvas) {
            observer.observe(canvas, {
                attributes: true,
                subtree: true,
                attributeFilter: ['style']
            });
        }
        </script>
