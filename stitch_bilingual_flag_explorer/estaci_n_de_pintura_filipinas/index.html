<script>
        // ── AUDIO SYSTEM ──────────────────────────────────────────
        const AudioController = {
            ctx: null,
            initContext() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
            alarm() { try { this.initContext(); const c=this.ctx; for(let i=0;i<3;i++){ setTimeout(()=>{ const o=c.createOscillator(),g=c.createGain(); o.type='sawtooth'; o.frequency.setValueAtTime(800,c.currentTime); o.frequency.linearRampToValueAtTime(1000,c.currentTime+0.15); o.frequency.linearRampToValueAtTime(800,c.currentTime+0.3); g.gain.setValueAtTime(0.1,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3); o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+0.35); },i*350); } } catch(e) {} },
            speakBilingual(es, en) { if (!('speechSynthesis' in window)) return; this.initContext(); try { speechSynthesis.cancel(); } catch(e) {} setTimeout(() => { const u=new SpeechSynthesisUtterance(es); u.lang='es-ES'; u.rate=0.95; u.onend=()=>{ const u2=new SpeechSynthesisUtterance(en); u2.lang='en-US'; u2.rate=0.95; speechSynthesis.speak(u2); }; speechSynthesis.speak(u); }, 80); }
        };
        function speakCountry() { AudioController.speakBilingual('Filipinas','Philippines'); }
        function triggerAlarm() { AudioController.alarm(); setTimeout(()=>AudioController.speakBilingual('¡Alarma de Filipinas!','Philippines Alarm!'),750); }
        function playAudio(term) {
            const labels = { 'philippines':['Filipinas','Philippines'], 'azul':['Azul','Blue'], 'rojo':['Rojo','Red'], 'amarillo':['Amarillo','Yellow'], 'blanco':['Blanco','White'], 'title':['Filipinas','Philippines'], 'alarm':['¡Alarma de Filipinas!','Philippines Alarm!'] };
            if (term === 'alarm') { triggerAlarm(); return; }
            const pair = labels[term.toLowerCase()] || [term, term];
            AudioController.speakBilingual(pair[0], pair[1]);
        }

        let currentColor = null;
        let currentLabel = "";

        function selectColor(color, label) {
            currentColor = color;
            currentLabel = label;
            document.querySelectorAll('.group div').forEach(el => { el.classList.remove('ring-4', 'ring-primary', 'scale-110'); });
            event.currentTarget.querySelector('div').classList.add('ring-4', 'ring-primary', 'scale-110');
            playAudio(label.toLowerCase());
        }

        function applyColor(elementId, correctColor) {
            if (!currentColor) {
                alert("Primero elige un color de abajo!");
                return;
            }

            const element = document.getElementById(elementId);
            
            // In a real app, we'd check if the user picked the "correct" color for that section
            // but for a "Paint Station" for kids, we let them paint but maybe reward correctness.
            element.setAttribute('fill', currentColor);
            element.setAttribute('stroke', 'none');
            
            // Pop effect
            const canvas = document.getElementById('paintingCanvas');
            canvas.classList.add('active');
            setTimeout(() => canvas.classList.remove('active'), 200);
        }

        function playAudio(term) { /* see AudioController above */ }
    </script>
