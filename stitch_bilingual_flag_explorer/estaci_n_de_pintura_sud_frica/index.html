<script>const COUNTRY_ID = 'sud_frica';

        // ── AUDIO SYSTEM ──────────────────────────────────────────
        const AudioController = {
            ctx: null,
            initContext() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            alarm() {
                try {
                    this.initContext();
                    const c = this.ctx;
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            const o = c.createOscillator(), g = c.createGain();
                            o.type = 'sawtooth';
                            o.frequency.setValueAtTime(800, c.currentTime);
                            o.frequency.linearRampToValueAtTime(1000, c.currentTime + 0.15);
                            o.frequency.linearRampToValueAtTime(800, c.currentTime + 0.3);
                            g.gain.setValueAtTime(0.1, c.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
                            o.connect(g); g.connect(c.destination);
                            o.start(); o.stop(c.currentTime + 0.35);
                        }, i * 350);
                    }
                } catch(e) {}
            },
            speakBilingual(es, en) {
                if (!('speechSynthesis' in window)) return;
                this.initContext();
                try { speechSynthesis.cancel(); } catch(e) {}
                setTimeout(() => {
                    const u = new SpeechSynthesisUtterance(es);
                    u.lang = 'es-ES';
                    u.rate = 0.95;
                    u.onend = () => {
                        const u2 = new SpeechSynthesisUtterance(en);
                        u2.lang = 'en-US';
                        u2.rate = 0.95;
                        speechSynthesis.speak(u2);
                    };
                    speechSynthesis.speak(u);
                }, 80);
            }
        };
        function speakCountry() { AudioController.speakBilingual('Sudáfrica', 'South Africa'); }
        function triggerAlarm() { AudioController.alarm(); setTimeout(() => AudioController.speakBilingual('¡Alarma de Sudáfrica!', 'South Africa Alarm!'), 750); }

        let currentColor = null;
        let colorName = "";

        function selectColor(hex, name, btn) {
            currentColor = hex;
            colorName = name;
            
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active-brush', 'bg-white', 'shadow-inner'));
            btn.classList.add('active-brush', 'bg-white', 'shadow-inner');
            
            const labels = { 'Verde':['Verde','Green'], 'Amarillo':['Amarillo','Yellow'], 'Blanco':['Blanco','White'], 'Rojo':['Rojo','Red'], 'Azul':['Azul','Blue'], 'Negro':['Negro','Black'] };
            const pair = labels[name] || [name, name];
            AudioController.speakBilingual(pair[0], pair[1]);
        }

        function paint(element) {
            if (!currentColor) {
                // Shake or feedback to pick a color first
                element.classList.add('animate-pulse');
                setTimeout(() => element.classList.remove('animate-pulse'), 500);
                return;
            }
            
            const target = element.getAttribute('data-color-target');
            
            // Simple logic for kids: if they pick the right color for the right area
            // In a real app, we might allow any color but praise for the right one
            element.style.fill = currentColor;
            
            // Celebration effect for specific touch
            createSparkle(element);
        }

        function playAudio(text) {
            AudioController.speakBilingual(text, text);
        }

        function createSparkle(target) {
            const sparkle = document.createElement('div');
            sparkle.className = 'absolute pointer-events-none text-secondary text-2xl animate-ping';
            sparkle.innerHTML = '✨';
            sparkle.style.left = '50%';
            sparkle.style.top = '50%';
            target.parentElement.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 1000);
        }
    
        
        function compareColor(el, expected) {
            if (!el) return false;
            const clean = (s) => s.replace(/\s+/g, '').toLowerCase();
            const exp = clean(expected);
            
            const bg = el.style.backgroundColor;
            if (bg) {
                if (clean(bg).includes(exp)) return true;
                if (exp.startsWith('#') && exp.length === 7) {
                    const r = parseInt(exp.slice(1, 3), 16);
                    const g = parseInt(exp.slice(3, 5), 16);
                    const b = parseInt(exp.slice(5, 7), 16);
                    if (clean(bg).includes(`rgb(${r},${g},${b})`)) return true;
                }
            }
            
            const fill = el.getAttribute('fill');
            if (fill) {
                if (clean(fill).includes(exp)) return true;
                if (exp.startsWith('#') && exp.length === 7) {
                    const r = parseInt(exp.slice(1, 3), 16);
                    const g = parseInt(exp.slice(3, 5), 16);
                    const b = parseInt(exp.slice(5, 7), 16);
                    if (clean(fill).includes(`rgb(${r},${g},${b})`)) return true;
                }
            }
            
            const sFill = el.style.fill;
            if (sFill) {
                if (clean(sFill).includes(exp)) return true;
                if (exp.startsWith('#') && exp.length === 7) {
                    const r = parseInt(exp.slice(1, 3), 16);
                    const g = parseInt(exp.slice(3, 5), 16);
                    const b = parseInt(exp.slice(5, 7), 16);
                    if (clean(sFill).includes(`rgb(${r},${g},${b})`)) return true;
                }
            }
            
            const classes = el.className;
            if (classes && typeof classes === 'string') {
                if (clean(classes).includes('bg-[' + exp + ']') || clean(classes).includes('bg-' + exp)) return true;
            }
            
            return false;
        }

        function checkCompletion() {
            const paths = Array.from(document.querySelectorAll('.flag-path'));
            const allPainted = paths.length > 0 && paths.every(p => p.getAttribute('fill') !== '#f0f4fb' && p.style.fill !== '#f0f4fb');
            const colorMap = { 'Rojo': '#ba1a1a', 'Azul': '#006495', 'Verde': '#2b6c00', 'Amarillo': '#fccc00', 'Negro': '#171c21', 'Blanco': '#ffffff' };
            const isCorrect = allPainted && paths.every(p => {
                const targetColor = p.getAttribute('data-color-target');
                const expectedHex = colorMap[targetColor];
                return compareColor(p, expectedHex);
            });
            
            if (isCorrect) {
                AudioController.speakBilingual('¡Lo lograste! ¡Bandera completa!', 'You did it! Flag complete!');
                const canvas = document.getElementById('flag-canvas') || document.getElementById('paintingCanvas') || document.getElementById('flag-container') || document.getElementById('flag-svg') || document.getElementById('australia-flag-svg');
                if (canvas) canvas.classList.add('celebration');
                setTimeout(() => {
                    window.location.href = `../celebration_reward/index.html?country=${COUNTRY_ID}`;
                }, 2000);
            } else if (allPainted) {
                AudioController.speakBilingual('¡Casi! Sigue intentando con los colores correctos.', 'Almost! Keep trying with the correct colors.');
            } else {
                AudioController.speakBilingual('¡Sigue pintando!', 'Keep painting!');
            }
        }

        // Auto-painted observer to dynamically track coloring
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                    const target = mutation.target;
                    if (target.style.backgroundColor && target.style.backgroundColor !== 'transparent' && target.style.backgroundColor !== '') {
                        target.dataset.painted = 'true';
                    } else {
                        target.removeAttribute('data-painted');
                    }
                }
            });
        });
        const canvas = document.getElementById('flag-canvas');
        if (canvas) {
            observer.observe(canvas, {
                attributes: true,
                subtree: true,
                attributeFilter: ['style']
            });
        }
        </script>
