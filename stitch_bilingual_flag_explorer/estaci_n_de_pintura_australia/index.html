<script>
        const AudioController = {
            ctx: null,
            initContext() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            alarm() {
                try {
                    this.initContext();
                    const c = this.ctx;
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            const o = c.createOscillator(), g = c.createGain();
                            o.type = 'sawtooth';
                            o.frequency.setValueAtTime(800, c.currentTime);
                            o.frequency.linearRampToValueAtTime(1000, c.currentTime + 0.15);
                            o.frequency.linearRampToValueAtTime(800, c.currentTime + 0.3);
                            g.gain.setValueAtTime(0.1, c.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
                            o.connect(g); g.connect(c.destination);
                            o.start(); o.stop(c.currentTime + 0.35);
                        }, i * 350);
                    }
                } catch(e) {}
            },
            speakBilingual(es, en) {
                if (!('speechSynthesis' in window)) return;
                this.initContext();
                try { speechSynthesis.cancel(); } catch(e) {}
                setTimeout(() => {
                    const u = new SpeechSynthesisUtterance(es);
                    u.lang = 'es-ES';
                    u.rate = 0.95;
                    u.onend = () => {
                        const u2 = new SpeechSynthesisUtterance(en);
                        u2.lang = 'en-US';
                        u2.rate = 0.95;
                        speechSynthesis.speak(u2);
                    };
                    speechSynthesis.speak(u);
                }, 80);
            }
        };
const COUNTRY_ID = 'australia';

// ─────────────────────────────────────────────
//  AUDIO CONTROLLER
// ─────────────────────────────────────────────
const Audio = (() => {
  let _ctx = null;

  function ctx() {
    if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (_ctx.state === 'suspended') _ctx.resume();
    return _ctx;
  }

  function tone(freq, type, dur, vol) {
    try {
      const c   = ctx();
      const osc = c.createOscillator();
      const g   = c.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      g.gain.setValueAtTime(vol, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      osc.connect(g);
      g.connect(c.destination);
      osc.start();
      osc.stop(c.currentTime + dur + 0.05);
    } catch(e) { console.warn('tone:', e); }
  }

  return {
    boing() {
      tone(180, 'sine',   0.30, 0.20);
      setTimeout(() => tone(100, 'square', 0.15, 0.08), 80);
    },
    sparkle() {
      [880,1100,1320,1540].forEach((f,i) => setTimeout(() => tone(f,'triangle',0.18,0.07), i*55));
    },
    victory() {
      [261.63,329.63,392,523.25,659.25,783.99,1046.5].forEach(
        (f,i) => setTimeout(() => tone(f,'sine',0.4,0.12), i*110)
      );
    },
    alarm() {
      try {
        const c = ctx(), now = c.currentTime;
        for (let i = 0; i < 4; i++) {
          const t   = now + i * 0.32;
          const osc = c.createOscillator();
          const g   = c.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(750, t);
          osc.frequency.linearRampToValueAtTime(1350, t + 0.16);
          osc.frequency.linearRampToValueAtTime(750,  t + 0.30);
          g.gain.setValueAtTime(0.18, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.30);
          osc.connect(g);
          g.connect(c.destination);
          osc.start(t);
          osc.stop(t + 0.36);
        }
      } catch(e) { console.warn('alarm:', e); }
    },
    speak(es, en) {
      if (!('speechSynthesis' in window)) return;
      try { speechSynthesis.cancel(); } catch(e) {}
      setTimeout(() => {
        const uEs = new SpeechSynthesisUtterance(es);
        uEs.lang  = 'es-ES';
        uEs.rate  = 0.90;
        uEs.pitch = 1.10;
        uEs.onend = () => {
          if (!en) return;
          setTimeout(() => {
            const uEn = new SpeechSynthesisUtterance(en);
            uEn.lang  = 'en-AU';
            uEn.rate  = 0.90;
            speechSynthesis.speak(uEn);
          }, 200);
        };
        speechSynthesis.speak(uEs);
      }, 80);
    }
  };
})();

  azul:   { name:'blue',  es:'Azul',   en:'Blue'  },
  blanco: { name:'white', es:'Blanco', en:'White' },
  rojo:   { name:'red',   es:'Rojo',   en:'Red'   },
};

// ─────────────────────────────────────────────
//  COLOR SELECTION
// ─────────────────────────────────────────────
function selectColor(key) {
  selKey = key;

  // Reset all palette visuals
  Object.keys(PALETTE).forEach(k => {
    const pal = document.getElementById('palette-' + k);
    if (pal) { pal.style.transform = ''; pal.style.boxShadow = ''; }
    const cm = pal && pal.querySelector('.check-mark');
    if (cm) cm.classList.add('opacity-0');
  });

  // Highlight selected
  const sel = document.getElementById('palette-' + key);
  if (sel) {
    sel.style.transform  = 'scale(1.12)';
    sel.style.boxShadow  = '0 0 0 4px #006495, 0 0 0 8px #f7f9ff';
    const cm = sel.querySelector('.check-mark');
    if (cm) cm.classList.remove('opacity-0');
  }

  const p = PALETTE[key];
  Audio.speak(p.es, p.en);
}

// ─────────────────────────────────────────────
//  PROGRESS DOTS
// ─────────────────────────────────────────────
function updateProgress() {
  const dots = document.getElementById('progress-dots');
  dots.innerHTML = '';
  Object.keys(REGIONS).forEach(k => {
    const d = document.createElement('div');
    const done = painted[k];
    d.style.cssText = `width:14px;height:14px;border-radius:50%;
      background:${done ? '#2b6c00' : '#dee3e9'};
      border:2px solid ${done ? '#1a4600' : '#bec8d3'};
      transition: background 0.3s, border-color 0.3s;`;
    dots.appendChild(d);
  });
}

// ─────────────────────────────────────────────
//  PAINT A REGION
// ─────────────────────────────────────────────
function paintRegion(el) {
  if (!selKey) {
    // Hint: pick a color first
    document.querySelectorAll('[id^="palette-"]').forEach(p => {
      p.classList.add('shake');
      setTimeout(() => p.classList.remove('shake'), 400);
    });
    Audio.boing();
    return;
  }

  const region = el.getAttribute('data-region');
  if (!region || !REGIONS[region]) return;

  const correctColor = REGIONS[region].correct;
  const chosenColor  = PALETTE[selKey].name;

  if (chosenColor === correctColor) {
    // ✅ Correct!
    const finalHex = COLOR_HEX[correctColor];
    applyFill(el, finalHex, correctColor === 'white');

    // Blue field + uj-bg are always painted together
    if (region === 'field') {
      const ujBg = document.querySelector('[data-region="uj-bg"]');
      if (ujBg) { applyFill(ujBg, finalHex, false); painted['uj-bg'] = true; }
    } else if (region === 'uj-bg') {
      const field = document.querySelector('[data-region="field"]');
      if (field) { applyFill(field, finalHex, false); painted['field'] = true; }
    }

    painted[region] = true;
    updateProgress();
    Audio.sparkle();
    Audio.speak('¡Correcto!', 'Correct!');
    checkWin();

  } else {
    // ❌ Wrong color
    el.classList.add('shake');
    setTimeout(() => el.classList.remove('shake'), 400);
    Audio.boing();
    Audio.speak('¡Intenta otro color!', 'Try another color!');
  }
}

function applyFill(el, hex, isWhite) {
  if (el.tagName.toLowerCase() === 'g') {
    el.querySelectorAll('*').forEach(ch => {
      ch.setAttribute('fill', hex);
      ch.setAttribute('stroke', isWhite ? '#cccccc' : 'none');
    });
  } else {
    el.setAttribute('fill', hex);
    el.setAttribute('stroke', isWhite ? '#cccccc' : 'none');
  }
}

// ─────────────────────────────────────────────
//  COMPLETION CHECK
// ─────────────────────────────────────────────
function checkWin() {
  if (!Object.values(painted).every(Boolean)) return;
  Audio.victory();
  Audio.speak('¡Increíble! ¡Pintaste la bandera de Australia!', 'Amazing! You painted Australia\'s flag!');
  setTimeout(() => {
    window.location.href = '../celebration_reward/index.html?country=australia';
  }, 2000);
}

function explicitFinish() {
  if (Object.values(painted).every(Boolean)) {
    checkWin();
  } else {
    Audio.boing();
    Audio.speak('¡Aún no está lista! Pinta todas las partes.', "Not done yet! Paint all parts.");
  }
}

// ─────────────────────────────────────────────
//  RESET
// ─────────────────────────────────────────────
function resetFlag() {
  Object.keys(REGIONS).forEach(k => {
    painted[k] = false;
    const el = document.querySelector(`[data-region="${k}"]`);
    if (!el) return;
    const rf = REGIONS[k].resetFill;
    if (el.tagName.toLowerCase() === 'g') {
      el.querySelectorAll('*').forEach(ch => {
        ch.setAttribute('fill', rf);
        ch.setAttribute('stroke', 'none');
      });
    } else {
      el.setAttribute('fill', rf);
      el.setAttribute('stroke', k.includes('star') || k.includes('fed') ? '#bbbbbb' : '#9ab0cc');
    }
  });
  updateProgress();

  // Reset palette UI
  selKey = null;
  Object.keys(PALETTE).forEach(k => {
    const pal = document.getElementById('palette-' + k);
    if (pal) { pal.style.transform = ''; pal.style.boxShadow = ''; }
    const cm = pal && pal.querySelector('.check-mark');
    if (cm) cm.classList.add('opacity-0');
  });
}

// ─────────────────────────────────────────────
//  GLOBAL SPEAK FUNCTIONS (called from HTML)
// ─────────────────────────────────────────────
function speakCountry() { AudioController.speakBilingual('Australia', 'Australia'); }
function triggerAlarm() { AudioController.alarm(); setTimeout(() => AudioController.speakBilingual('¡Alarma de Australia!', 'Australia Alarm!'), 750); }

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Attach click → paintRegion for all interactive SVG regions
  document.querySelectorAll('[data-region]').forEach(el => {
    el.addEventListener('click', () => paintRegion(el));
  });

  document.getElementById('reset-btn').addEventListener('click', resetFlag);
  document.getElementById('finish-btn').addEventListener('click', explicitFinish);

  updateProgress();

  // Auto-announce country after short delay
  setTimeout(speakCountry, 900);
});

        
        function checkCompletion() {
            const parts = document.querySelectorAll('#flag-canvas [id^="part-"], #flag-canvas [id^="stripe-"]');
            const done = [...parts].every(p => p.dataset.painted === 'true' || (p.style.backgroundColor && p.style.backgroundColor !== 'transparent' && p.style.backgroundColor !== ''));
            if (done) {
                AudioController.speakBilingual('¡Lo lograste! ¡Bandera completa!', 'You did it! Flag complete!');
                document.getElementById('flag-canvas').classList.add('celebration');
                setTimeout(() => {
                    window.location.href = `../celebration_reward/index.html?country=${COUNTRY_ID}`;
                }, 2000);
            } else {
                AudioController.speakBilingual('¡Sigue pintando!', 'Keep painting!');
            }
        }

        // Auto-painted observer to dynamically track coloring
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                    const target = mutation.target;
                    if (target.style.backgroundColor && target.style.backgroundColor !== 'transparent' && target.style.backgroundColor !== '') {
                        target.dataset.painted = 'true';
                    } else {
                        target.removeAttribute('data-painted');
                    }
                }
            });
        });
        const canvas = document.getElementById('flag-canvas');
        if (canvas) {
            observer.observe(canvas, {
                attributes: true,
                subtree: true,
                attributeFilter: ['style']
            });
        }
        </script>
