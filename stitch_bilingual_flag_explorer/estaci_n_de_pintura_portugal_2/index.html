<script>const COUNTRY_ID = 'portugal_2';

        // ── AUDIO SYSTEM ──────────────────────────────────────────
        const AudioController = {
            ctx: null,
            initContext() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            alarm() {
                try {
                    this.initContext();
                    const c = this.ctx;
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            const o = c.createOscillator(), g = c.createGain();
                            o.type = 'sawtooth';
                            o.frequency.setValueAtTime(800, c.currentTime);
                            o.frequency.linearRampToValueAtTime(1000, c.currentTime + 0.15);
                            o.frequency.linearRampToValueAtTime(800, c.currentTime + 0.3);
                            g.gain.setValueAtTime(0.1, c.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
                            o.connect(g); g.connect(c.destination);
                            o.start(); o.stop(c.currentTime + 0.35);
                        }, i * 350);
                    }
                } catch(e) {}
            },
            speakBilingual(es, en) {
                if (!('speechSynthesis' in window)) return;
                this.initContext();
                try { speechSynthesis.cancel(); } catch(e) {}
                setTimeout(() => {
                    const u = new SpeechSynthesisUtterance(es);
                    u.lang = 'es-ES';
                    u.rate = 0.95;
                    u.onend = () => {
                        const u2 = new SpeechSynthesisUtterance(en);
                        u2.lang = 'en-US';
                        u2.rate = 0.95;
                        speechSynthesis.speak(u2);
                    };
                    speechSynthesis.speak(u);
                }, 80);
            }
        };
        function speakCountry() { AudioController.speakBilingual('Portugal', 'Portugal'); }
        function triggerAlarm() { AudioController.alarm(); setTimeout(() => AudioController.speakBilingual('¡Alarma de Portugal!', 'Portugal Alarm!'), 750); }

        let selectedColor = null;

        function selectColor(color) {
            document.querySelectorAll('button[id^="btn-"]').forEach(btn => {
                btn.classList.remove('pressed', 'ring-4', 'ring-primary');
            });
            
            selectedColor = color;
            const activeBtn = document.getElementById(`btn-${color}`);
            activeBtn.classList.add('pressed', 'ring-4', 'ring-primary');

            if (window.navigator.vibrate) window.navigator.vibrate(20);
            
            const labels = { 'green':['Verde','Green'], 'red':['Rojo','Red'], 'yellow':['Amarillo','Yellow'] };
            const pair = labels[color] || [color, color];
            AudioController.speakBilingual(pair[0], pair[1]);
        }

        function applyColor(part) {
            if (!selectedColor) {
                alert("¡Primero elige un color de la paleta! 🎨");
                return;
            }

            const element = document.getElementById(`part-${part}`);
            const colors = {
                'green': '#1f5100',
                'red': '#ba1a1a',
                'yellow': '#fccc00'
            };

            if (part === 'green' && selectedColor === 'green') {
                element.style.backgroundColor = colors.green;
                element.classList.remove('hover:bg-surface-container');
            } else if (part === 'red' && selectedColor === 'red') {
                element.style.backgroundColor = colors.red;
                element.classList.remove('hover:bg-surface-container');
            } else if (part === 'shield' && selectedColor === 'yellow') {
                element.style.backgroundColor = 'rgba(252, 204, 0, 0.4)';
                element.style.borderRadius = '50%';
            } else {
                // Shake effect for wrong color
                element.animate([
                    { transform: 'translateX(0px)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(0px)' }
                ], { duration: 200 });
            }

            checkCompletion();
        }

        function checkCompletion() {
            const green = document.getElementById('part-green').style.backgroundColor;
            const red = document.getElementById('part-red').style.backgroundColor;
            
            if (green && red) {
                console.log("Flag looking good!");
            }
        }
    </script>
