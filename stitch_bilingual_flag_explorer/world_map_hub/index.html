        @keyframes pulse-ring {

            50% { transform: scale(1.2); opacity: 0.3; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        .animate-pulse-slow {
            animation: pulse-ring 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        /* Custom Clip Path for speech bubble */
        .speech-bubble-tail {

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Bilingual speaking function
            function speakBilingual(es, en) {
                if (!('speechSynthesis' in window)) return;
                window.speechSynthesis.cancel();
                const uEs = new SpeechSynthesisUtterance(es);
                uEs.lang = 'es-ES';
                uEs.rate = 1.0;
                uEs.onend = () => {
                    const uEn = new SpeechSynthesisUtterance(en);
                    uEn.lang = 'en-US';
                    uEn.rate = 1.0;
                    window.speechSynthesis.speak(uEn);
                };
                window.speechSynthesis.speak(uEs);
            }

            function playAlarmSound() {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const now = ctx.currentTime;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.linearRampToValueAtTime(800, now + 0.3);
                    osc.frequency.linearRampToValueAtTime(600, now + 0.6);
                    osc.frequency.linearRampToValueAtTime(800, now + 0.9);
                    
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(now + 1.2);
                } catch(e) {
                    console.log(e);
                }
            }

            // Speak page title when volume button is clicked
            const volBtn = document.querySelector('header button:last-child');
            if (volBtn) {
                volBtn.addEventListener('click', () => {
                    speakBilingual("Explorador de Banderas, Mapa del Mundo", "Flag Explorer, World Map");
                });
            }

            // Hook up alarm button
            const alarmBtn = document.querySelector('header button:nth-last-child(2)');
            if (alarmBtn) {
                alarmBtn.addEventListener('click', () => {
                    playAlarmSound();
                    speakBilingual("¡Atención! ¡Alarma del Explorador!", "Attention! Explorer Alarm!");
                });
            }

            const pins = document.querySelectorAll('.country-pin');
            
            // Map country ids
            const countryIds = {
                'mexico': { es: 'México', en: 'Mexico' },
                'ee._uu': { es: 'Estados Unidos', en: 'United States' },
                'canad_1': { es: 'Canadá', en: 'Canada' },
                'brasil': { es: 'Brasil', en: 'Brazil' },
                'espa_a': { es: 'España', en: 'Spain' },
                'francia': { es: 'Francia', en: 'France' },
                'alemania': { es: 'Alemania', en: 'Germany' },
                'italia': { es: 'Italia', en: 'Italy' },
                'jap_n': { es: 'Japón', en: 'Japan' },
                'australia': { es: 'Australia', en: 'Australia' }
            };

            pins.forEach(pin => {
                const href = pin.getAttribute('data-href') || '';
                let key = '';
                if (href.includes('mexico')) key = 'mexico';
                else if (href.includes('ee._uu')) key = 'ee._uu';
                else if (href.includes('canad_1')) key = 'canad_1';
                else if (href.includes('brasil')) key = 'brasil';
                else if (href.includes('espa_a')) key = 'espa_a';
                else if (href.includes('francia')) key = 'francia';
                else if (href.includes('alemania')) key = 'alemania';
                else if (href.includes('italia')) key = 'italia';
                else if (href.includes('jap_n')) key = 'jap_n';
                else if (href.includes('australia')) key = 'australia';

                const normKey = key.replace('_1', '').replace('ee._uu', 'usa').replace('espa_a', 'spain').replace('jap_n', 'japan');
                const isCompleted = localStorage.getItem(normKey + '_completed') === 'true';

                if (isCompleted) {
                    const pinInner = pin.querySelector('.relative.flex.flex-col');
                    if (pinInner) {
                        const badge = document.createElement('div');
                        badge.className = 'absolute -top-2 -right-2 bg-emerald-500 text-white w-6 h-6 rounded-full flex items-center justify-center border-2 border-white shadow-md z-30';
                        badge.innerHTML = '<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: \'FILL\' 1; color: white;">check_circle</span>';
                        pinInner.appendChild(badge);
                    }
                }

                pin.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (countryIds[key]) {
                        speakBilingual(countryIds[key].es, countryIds[key].en);
                    }
                    pin.style.transform = 'scale(0.9)';
                    setTimeout(() => {
                        pin.style.transform = 'scale(1)';
                        window.location.href = href;
                    }, 1500);
                });
            });

            function isLevel1Complete() {
                const level1Keys = ['mexico', 'usa', 'canada', 'france', 'italy', 'spain', 'brazil', 'japan', 'germany', 'australia'];
                return level1Keys.every(k => localStorage.getItem(k + '_completed') === 'true');
            }

            // Bind bottom navigation links
            const navButtons = document.querySelectorAll('nav button, nav a');
            navButtons.forEach(btn => {
                const text = btn.textContent || btn.innerText;
                if (text.includes('Pasaporte')) {
                    btn.addEventListener('click', () => {
                        window.location.href = '../mi_pasaporte_passport/index.html';
                    });
                } else if (text.includes('Jugar')) {
                    btn.addEventListener('click', () => {
                        if (isLevel1Complete()) {
                            window.location.href = '../sesi_n_de_quiz_biling_e/index.html';
                        } else {
                            playAlarmSound();
                            speakBilingual("¡Pinta las diez banderas primero para desbloquear el quiz!", "Paint all ten flags first to unlock the quiz!");
                        }
                    });
                } else if (text.includes('Explorar')) {
                    btn.addEventListener('click', () => {
                        window.location.href = '../world_map_hub/index.html';
                    });
                }
            });

            // Bind floating play button
            const floatPlayBtn = document.querySelector('main button.fixed');
            if (floatPlayBtn) {
                floatPlayBtn.addEventListener('click', () => {
                    if (isLevel1Complete()) {
                        window.location.href = '../sesi_n_de_quiz_biling_e/index.html';
                    } else {
                        playAlarmSound();
                        speakBilingual("¡Pinta las diez banderas primero para desbloquear el quiz!", "Paint all ten flags first to unlock the quiz!");
                    }
                });
            }

            // Gentle audio icon pulse
            if (volBtn) {
                setInterval(() => {
                    volBtn.classList.add('scale-110');
                    setTimeout(() => volBtn.classList.remove('scale-110'), 200);
                }, 5000);
            }
        });
    </script>
