            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
            user-select: none;

        body {
            font-family: 'Quicksand', sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* Tactile Shadow Buttons */
        .button-primary {
            @apply bg-primary-container text-on-primary-container border-b-[6px] border-primary active:border-b-0 active:translate-y-[6px] transition-all duration-75;
        }
        
        .button-secondary {
            @apply bg-surface-container-lowest text-primary border-b-[6px] border-surface-variant active:border-b-0 active:translate-y-[6px] transition-all duration-75;
        }

        /* Paint Interaction */
        .paint-target {
            transition: fill 0.3s ease, stroke 0.3s ease;
            cursor: pointer;
        }

        /* Audio Pulse Animation */
        @keyframes audio-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(252, 204, 0, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(252, 204, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(252, 204, 0, 0); }
        }
        .pulse-audio {
            animation: audio-pulse 2s infinite;
        }

        .canvas-bg {
            background-image: radial-gradient(#dee3e9 1px, transparent 1px);
            background-size: 24px 24px;
        }
    
        .celebration {
            animation: celebration-glow 1.5s infinite alternate;
        }
        @keyframes celebration-glow {
            from { box-shadow: 0 0 8px #22c55e, inset 0 0 8px #22c55e; }
            to { box-shadow: 0 0 24px #22c55e, inset 0 0 24px #22c55e; }
        }
</style>

<!-- Moon -->

<!-- Star -->
<path class="paint-target" d="M680,400 L717.3,427.1 L703.1,383.3 L740.4,356.2 L694.3,356.2 L680,312.5 L665.7,356.2 L619.6,356.2 L656.9,383.3 L642.7,427.1 Z" fill="#f0f4fb" id="flag-star" onclick="paint('flag-star')" stroke="#dee3e9" stroke-width="4"></path>

<p class="font-body-lg text-body-lg text-on-secondary-container mb-8">Has completado la bandera de Turquía.</p>
<button class="px-12 py-6 bg-white text-primary font-headline-md text-headline-md rounded-full shadow-xl border-b-[8px] border-surface-variant active:border-b-0 active:translate-y-[8px] transition-all" onclick="closeModal()">
                Siguiente Aventura
            </button>

<script>const COUNTRY_ID = 'turqu_a_2';

        // ── AUDIO SYSTEM ──────────────────────────────────────────
        const AudioController = {
            ctx: null,
            initContext() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            alarm() {
                try {
                    this.initContext();
                    const c = this.ctx;
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            const o = c.createOscillator(), g = c.createGain();
                            o.type = 'sawtooth';
                            o.frequency.setValueAtTime(800, c.currentTime);
                            o.frequency.linearRampToValueAtTime(1000, c.currentTime + 0.15);
                            o.frequency.linearRampToValueAtTime(800, c.currentTime + 0.3);
                            g.gain.setValueAtTime(0.1, c.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
                            o.connect(g); g.connect(c.destination);
                            o.start(); o.stop(c.currentTime + 0.35);
                        }, i * 350);
                    }
                } catch(e) {}
            },
            speakBilingual(es, en) {
                if (!('speechSynthesis' in window)) return;
                this.initContext();
                try { speechSynthesis.cancel(); } catch(e) {}
                setTimeout(() => {
                    const u = new SpeechSynthesisUtterance(es);
                    u.lang = 'es-ES';
                    u.rate = 0.95;
                    u.onend = () => {
                        const u2 = new SpeechSynthesisUtterance(en);
                        u2.lang = 'en-US';
                        u2.rate = 0.95;
                        speechSynthesis.speak(u2);
                    };
                    speechSynthesis.speak(u);
                }, 80);
            }
        };
        function speakCountry() { AudioController.speakBilingual('Turquía', 'Turkey'); }
        function triggerAlarm() { AudioController.alarm(); setTimeout(() => AudioController.speakBilingual('¡Alarma de Turquía!', 'Turkey Alarm!'), 750); }

        let selectedColor = null;

        function selectColor(color, name) {
            selectedColor = color;
            
            const labels = { 'Rojo':['Rojo','Red'], 'Blanco':['Blanco','White'] };
            const pair = labels[name] || [name, name];
            AudioController.speakBilingual(pair[0], pair[1]);
            
            // Haptic-like visual feedback on palette
            document.querySelectorAll('button div').forEach(div => div.classList.remove('ring-primary-container'));
        }

        function paint(elementId) {
            if (!selectedColor) {
                alert("¡Primero elige un color!");
                return;
            }
            const el = document.getElementById(elementId);
            el.setAttribute('fill', selectedColor);
            el.setAttribute('stroke', selectedColor);
        }

        function playAudio(term) {
            if (term === 'alarm') triggerAlarm();
            else if (term === 'turquia') speakCountry();
            else {
                const labels = { 'Rojo':['Rojo','Red'], 'Blanco':['Blanco','White'] };
                const pair = labels[term] || [term, term];
                AudioController.speakBilingual(pair[0], pair[1]);
            }
        }

        const checkBtn = document.getElementById('check-btn');
        const modal = document.getElementById('success-modal');
        const modalContent = document.getElementById('modal-content');

        checkBtn.addEventListener('click', () => {
            const bg = document.getElementById('flag-bg').getAttribute('fill');
            const moon = document.getElementById('flag-moon').getAttribute('fill');
            const star = document.getElementById('flag-star').getAttribute('fill');

            // Simplified check logic for Level 5
            if (bg === '#ba1a1a' && moon === '#ffffff' && star === '#ffffff') {
                showSuccess();
            } else {
                alert("¡Casi lo tienes! Recuerda: Fondo Rojo, Luna y Estrella Blancas.");
            }
        });

        function showSuccess() {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modalContent.classList.remove('scale-0');
                modalContent.classList.add('scale-100');
            }, 50);
        }

        function closeModal() {
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                location.reload(); // Reset for next play
            }, 300);
        }
    
        
        function checkCompletion() {
            const parts = document.querySelectorAll('#flag-canvas [id^="part-"], #flag-canvas [id^="stripe-"]');
            const done = [...parts].every(p => p.dataset.painted === 'true' || (p.style.backgroundColor && p.style.backgroundColor !== 'transparent' && p.style.backgroundColor !== ''));
            if (done) {
                AudioController.speakBilingual('¡Lo lograste! ¡Bandera completa!', 'You did it! Flag complete!');
                document.getElementById('flag-canvas').classList.add('celebration');
                setTimeout(() => {
                    window.location.href = `../celebration_reward/index.html?country=${COUNTRY_ID}`;
                }, 2000);
            } else {
                AudioController.speakBilingual('¡Sigue pintando!', 'Keep painting!');
            }
        }

        // Auto-painted observer to dynamically track coloring
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                    const target = mutation.target;
                    if (target.style.backgroundColor && target.style.backgroundColor !== 'transparent' && target.style.backgroundColor !== '') {
                        target.dataset.painted = 'true';
                    } else {
                        target.removeAttribute('data-painted');
                    }
                }
            });
        });
        const canvas = document.getElementById('flag-canvas');
        if (canvas) {
            observer.observe(canvas, {
                attributes: true,
                subtree: true,
                attributeFilter: ['style']
            });
        }
        </script>
