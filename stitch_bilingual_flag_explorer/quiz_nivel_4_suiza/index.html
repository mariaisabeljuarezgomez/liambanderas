<!-- Simple click interaction simulation -->
<script>
        document.querySelectorAll('.chunky-card').forEach(card => {
            card.addEventListener('click', function() {
                // Remove selected state from others
                document.querySelectorAll('.chunky-card').forEach(c => {
                    c.classList.remove('border-primary-container', 'bg-primary-fixed');
                    c.querySelector('.material-symbols-outlined:last-child').innerText = 'circle';
                    c.querySelector('.material-symbols-outlined:last-child').classList.remove('text-primary');
                });
                
                // Add selected state
                this.classList.add('border-primary-container', 'bg-primary-fixed');
                const icon = this.querySelector('.material-symbols-outlined:last-child');
                icon.innerText = 'check_circle';
                icon.classList.add('text-primary');
                icon.style.fontVariationSettings = "'FILL' 1";
            });
        });

        // Speaker click animation
        const speaker = document.querySelector('.audio-pulse');
        speaker.addEventListener('click', () => {
            speaker.style.transform = 'scale(0.9) translateY(4px)';
            setTimeout(() => {
                speaker.style.transform = 'scale(1) translateY(0)';
            }, 100);
        });
    </script>

    <script>
        const QuizAudioController = {
            ctx: null,
            initContext() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            playSuccess() {
                this.initContext();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, this.ctx.currentTime); // C5
                osc.frequency.setValueAtTime(659.25, this.ctx.currentTime + 0.1); // E5
                osc.frequency.setValueAtTime(783.99, this.ctx.currentTime + 0.2); // G5
                osc.frequency.setValueAtTime(1046.50, this.ctx.currentTime + 0.3); // C6
                
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, this.ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.5);
            },
            playError() {
                this.initContext();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, this.ctx.currentTime + 0.3);
                
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.3);
            },
            alarm() {
                this.initContext();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, this.ctx.currentTime);
                osc.frequency.setValueAtTime(600, this.ctx.currentTime + 0.25);
                osc.frequency.setValueAtTime(400, this.ctx.currentTime + 0.5);
                osc.frequency.setValueAtTime(600, this.ctx.currentTime + 0.75);
                
                gain.gain.value = 0.1;
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 1.0);
            },
            speakBilingual(es, en) {
                if (!('speechSynthesis' in window)) return;
                this.initContext();
                try { window.speechSynthesis.cancel(); } catch(e) {}
                
                setTimeout(() => {
                    const uEs = new SpeechSynthesisUtterance(es);
                    uEs.lang = 'es-ES';
                    uEs.rate = 0.95;
                    
                    uEs.onend = () => {
                        const uEn = new SpeechSynthesisUtterance(en);
                        uEn.lang = 'en-US';
                        uEn.rate = 0.95;
                        window.speechSynthesis.speak(uEn);
                    };
                    window.speechSynthesis.speak(uEs);
                }, 80);
            }
        };
    </script>
