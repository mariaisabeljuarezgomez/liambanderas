<script>const COUNTRY_ID = 'pa_ses_bajos';

        // ── AUDIO SYSTEM ──────────────────────────────────────────
        const AudioController = {
            ctx: null,
            initContext() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            alarm() {
                try {
                    this.initContext();
                    const c = this.ctx;
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            const o = c.createOscillator(), g = c.createGain();
                            o.type = 'sawtooth';
                            o.frequency.setValueAtTime(800, c.currentTime);
                            o.frequency.linearRampToValueAtTime(1000, c.currentTime + 0.15);
                            o.frequency.linearRampToValueAtTime(800, c.currentTime + 0.3);
                            g.gain.setValueAtTime(0.1, c.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
                            o.connect(g); g.connect(c.destination);
                            o.start(); o.stop(c.currentTime + 0.35);
                        }, i * 350);
                    }
                } catch(e) {}
            },
            speakBilingual(es, en) {
                if (!('speechSynthesis' in window)) return;
                this.initContext();
                try { speechSynthesis.cancel(); } catch(e) {}
                setTimeout(() => {
                    const u = new SpeechSynthesisUtterance(es);
                    u.lang = 'es-ES';
                    u.rate = 0.95;
                    u.onend = () => {
                        const u2 = new SpeechSynthesisUtterance(en);
                        u2.lang = 'en-US';
                        u2.rate = 0.95;
                        speechSynthesis.speak(u2);
                    };
                    speechSynthesis.speak(u);
                }, 80);
            }
        };
        function speakCountry() { AudioController.speakBilingual('Países Bajos', 'Netherlands'); }
        function triggerAlarm() { AudioController.alarm(); setTimeout(() => AudioController.speakBilingual('¡Alarma de Países Bajos!', 'Netherlands Alarm!'), 750); }

        let currentColor = null;
        let progress = { top: false, middle: false, bottom: false };

        function selectColor(color) {
            currentColor = color;
            document.querySelectorAll('.tactile-btn').forEach(btn => {
                btn.classList.remove('scale-110', 'ring-4', 'ring-primary');
            });
            const btnId = 'btn-' + color;
            document.getElementById(btnId).classList.add('scale-110', 'ring-4', 'ring-primary');
            const labels = { 'red':['Rojo','Red'], 'white':['Blanco','White'], 'blue':['Azul','Blue'] };
            const pair = labels[color] || [color, color];
            AudioController.speakBilingual(pair[0], pair[1]);
        }

        function paintStrip(position) {
            if (!currentColor) {
                alert('¡Primero elige un color!');
                return;
            }

            const targetStrip = document.getElementById('strip-' + (position === 'red' ? 'top' : position === 'white' ? 'middle' : 'bottom'));
            
            let hexColor = '';
            if (currentColor === 'red') hexColor = '#C8102E';
            if (currentColor === 'white') hexColor = '#FFFFFF';
            if (currentColor === 'blue') hexColor = '#1E3A8A';

            targetStrip.style.backgroundColor = hexColor;
            targetStrip.innerHTML = ''; // Remove the paint icon

            // Check if correct
            if (position === currentColor) {
                if (position === 'red') progress.top = true;
                if (position === 'white') progress.middle = true;
                if (position === 'blue') progress.bottom = true;
            }

            checkWin();
        }

        function checkWin() {
            if (progress.top && progress.middle && progress.bottom) {
                setTimeout(() => {
                    document.getElementById('success-overlay').classList.remove('hidden');
                    document.getElementById('success-overlay').classList.add('flex');
                    AudioController.speakBilingual('¡Increíble! Has pintado la bandera perfectamente.','Incredible! You painted the flag perfectly.');
                }, 500);
            }
        }
    
        
        function checkCompletion() {
            const parts = document.querySelectorAll('#flag-canvas [id^="part-"], #flag-canvas [id^="stripe-"]');
            const done = [...parts].every(p => p.dataset.painted === 'true' || (p.style.backgroundColor && p.style.backgroundColor !== 'transparent' && p.style.backgroundColor !== ''));
            if (done) {
                AudioController.speakBilingual('¡Lo lograste! ¡Bandera completa!', 'You did it! Flag complete!');
                document.getElementById('flag-canvas').classList.add('celebration');
                setTimeout(() => {
                    window.location.href = `../celebration_reward/index.html?country=${COUNTRY_ID}`;
                }, 2000);
            } else {
                AudioController.speakBilingual('¡Sigue pintando!', 'Keep painting!');
            }
        }

        // Auto-painted observer to dynamically track coloring
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                    const target = mutation.target;
                    if (target.style.backgroundColor && target.style.backgroundColor !== 'transparent' && target.style.backgroundColor !== '') {
                        target.dataset.painted = 'true';
                    } else {
                        target.removeAttribute('data-painted');
                    }
                }
            });
        });
        const canvas = document.getElementById('flag-canvas');
        if (canvas) {
            observer.observe(canvas, {
                attributes: true,
                subtree: true,
                attributeFilter: ['style']
            });
        }
        </script>
