<script>
        // ── AUDIO SYSTEM ──────────────────────────────────────────
        const AudioController = {
            ctx: null,
            initContext() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
            alarm() { try { this.initContext(); const c=this.ctx; for(let i=0;i<3;i++){ setTimeout(()=>{ const o=c.createOscillator(),g=c.createGain(); o.type='sawtooth'; o.frequency.setValueAtTime(800,c.currentTime); o.frequency.linearRampToValueAtTime(1000,c.currentTime+0.15); o.frequency.linearRampToValueAtTime(800,c.currentTime+0.3); g.gain.setValueAtTime(0.1,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3); o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+0.35); },i*350); } } catch(e) {} },
            speakBilingual(es, en) { if (!('speechSynthesis' in window)) return; this.initContext(); try { speechSynthesis.cancel(); } catch(e) {} setTimeout(() => { const u=new SpeechSynthesisUtterance(es); u.lang='es-ES'; u.rate=0.95; u.onend=()=>{ const u2=new SpeechSynthesisUtterance(en); u2.lang='en-US'; u2.rate=0.95; speechSynthesis.speak(u2); }; speechSynthesis.speak(u); }, 80); }
        };
        function speakCountry() { AudioController.speakBilingual('Nigeria','Nigeria'); }
        function triggerAlarm() { AudioController.alarm(); setTimeout(()=>AudioController.speakBilingual('¡Alarma de Nigeria!','Nigeria Alarm!'),750); }
        function playAudio(term) {
            const labels = { 'verde':['Verde','Green'], 'blanco':['Blanco','White'], 'instruction':['Pinta las bandas de Nigeria. Verde, Blanco y Verde.','Paint the bands of Nigeria. Green, White and Green.'] };
            const pair = labels[term] || [term, term];
            AudioController.speakBilingual(pair[0], pair[1]);
        }

        let selectedColor = null;

        function selectColor(color, element) {
            selectedColor = color;
            document.querySelectorAll('.color-tool').forEach(tool => { tool.classList.remove('ring-4', 'ring-primary', 'brush-active'); });
            element.classList.add('ring-4', 'ring-primary', 'brush-active');
            AudioController.speakBilingual(color === '#2b6c00' ? 'Verde' : 'Blanco', color === '#2b6c00' ? 'Green' : 'White');
        }

        function paintBand(id) {
            if (!selectedColor) return;
            const band = document.getElementById(id);
            band.style.backgroundColor = selectedColor;
            band.innerHTML = ''; // Remove the paint icon
            
            checkCompletion();
        }

        function checkCompletion() {
            const b1 = document.getElementById('band-1').style.backgroundColor;
            const b2 = document.getElementById('band-2').style.backgroundColor;
            const b3 = document.getElementById('band-3').style.backgroundColor;

            // Simple validation (Green: #2b6c00, White: #ffffff)
            // Note: color strings might return as rgb()
            if (b1 && b2 && b3) {
                // If all painted, show a mini celebration effect or audio
                console.log("¡Bandera pintada!");
            }
        }

        function playAudio(term) { /* see AudioController above */ }
    </script>
