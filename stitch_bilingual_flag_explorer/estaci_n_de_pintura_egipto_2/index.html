<script>const COUNTRY_ID = 'egipto_2';

        // ── AUDIO SYSTEM ──────────────────────────────────────────
        const AudioController = {
            ctx: null,
            initContext() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            alarm() {
                try {
                    this.initContext();
                    const c = this.ctx;
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            const o = c.createOscillator(), g = c.createGain();
                            o.type = 'sawtooth';
                            o.frequency.setValueAtTime(800, c.currentTime);
                            o.frequency.linearRampToValueAtTime(1000, c.currentTime + 0.15);
                            o.frequency.linearRampToValueAtTime(800, c.currentTime + 0.3);
                            g.gain.setValueAtTime(0.1, c.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
                            o.connect(g); g.connect(c.destination);
                            o.start(); o.stop(c.currentTime + 0.35);
                        }, i * 350);
                    }
                } catch(e) {}
            },
            speakBilingual(es, en) {
                if (!('speechSynthesis' in window)) return;
                this.initContext();
                try { speechSynthesis.cancel(); } catch(e) {}
                setTimeout(() => {
                    const u = new SpeechSynthesisUtterance(es);
                    u.lang = 'es-ES';
                    u.rate = 0.95;
                    u.onend = () => {
                        const u2 = new SpeechSynthesisUtterance(en);
                        u2.lang = 'en-US';
                        u2.rate = 0.95;
                        speechSynthesis.speak(u2);
                    };
                    speechSynthesis.speak(u);
                }, 80);
            }
        };
        function speakCountry() { AudioController.speakBilingual('Egipto', 'Egypt'); }
        function triggerAlarm() { AudioController.alarm(); setTimeout(() => AudioController.speakBilingual('¡Alarma de Egipto!', 'Egypt Alarm!'), 750); }

        let currentColor = '';

        function selectColor(colorClass, element) {
            currentColor = colorClass;
            document.querySelectorAll('section button').forEach(btn => btn.classList.remove('color-active'));
            element.classList.add('color-active');
            const map = { 'bg-[#ba1a1a]':['Rojo','Red'], 'bg-white':['Blanco','White'], 'bg-[#171c21]':['Negro','Black'] };
            const pair = map[colorClass] || [colorClass, colorClass];
            AudioController.speakBilingual(pair[0], pair[1]);
        }

        // Apply color to flag stripes
        document.querySelectorAll('.paint-surface').forEach(stripe => {
            stripe.addEventListener('click', function() {
                if (currentColor) {
                    // Remove current bg classes
                    this.className = this.className.replace(/bg-\[[^\]]+\]|bg-white|bg-surface-container-highest/g, '').trim();
                    // Add new color class
                    this.classList.add(currentColor);
                    // Hide the "paint" icon hint
                    const icon = this.querySelector('.material-symbols-outlined');
                    if (icon) icon.style.opacity = '0';
                }
            });
        });

        // Simple feedback for the check button
        document.getElementById('check-flag').addEventListener('click', function() {
            const top = document.getElementById('stripe-top');
            const mid = document.getElementById('stripe-middle');
            const bot = document.getElementById('stripe-bottom');

            // Correct Egypt sequence: Red, White, Black
            const isCorrect = top.classList.contains('bg-[#ba1a1a]') && 
                              mid.classList.contains('bg-white') && 
                              bot.classList.contains('bg-[#171c21]');

            if (isCorrect) {
                alert('¡Excelente! ¡Has completado la bandera de Egipto!');
                this.classList.replace('bg-primary', 'bg-tertiary-container');
                this.innerHTML = '<span>¡Completado!</span> <span class="material-symbols-outlined">stars</span>';
            } else {
                alert('¡Casi lo tienes! El orden es Rojo, Blanco y Negro.');
            }
        });
    
        
        function checkCompletion() {
            const parts = document.querySelectorAll('#flag-canvas [id^="part-"], #flag-canvas [id^="stripe-"]');
            const done = [...parts].every(p => p.dataset.painted === 'true' || (p.style.backgroundColor && p.style.backgroundColor !== 'transparent' && p.style.backgroundColor !== ''));
            if (done) {
                AudioController.speakBilingual('¡Lo lograste! ¡Bandera completa!', 'You did it! Flag complete!');
                document.getElementById('flag-canvas').classList.add('celebration');
                setTimeout(() => {
                    window.location.href = `../celebration_reward/index.html?country=${COUNTRY_ID}`;
                }, 2000);
            } else {
                AudioController.speakBilingual('¡Sigue pintando!', 'Keep painting!');
            }
        }

        // Auto-painted observer to dynamically track coloring
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                    const target = mutation.target;
                    if (target.style.backgroundColor && target.style.backgroundColor !== 'transparent' && target.style.backgroundColor !== '') {
                        target.dataset.painted = 'true';
                    } else {
                        target.removeAttribute('data-painted');
                    }
                }
            });
        });
        const canvas = document.getElementById('flag-canvas');
        if (canvas) {
            observer.observe(canvas, {
                attributes: true,
                subtree: true,
                attributeFilter: ['style']
            });
        }
        </script>
