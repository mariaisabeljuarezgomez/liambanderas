<script>const COUNTRY_ID = 'marruecos';

        // ── AUDIO SYSTEM ──────────────────────────────────────────
        const AudioController = {
            ctx: null,
            initContext() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            alarm() {
                try {
                    this.initContext();
                    const c = this.ctx;
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            const o = c.createOscillator(), g = c.createGain();
                            o.type = 'sawtooth';
                            o.frequency.setValueAtTime(800, c.currentTime);
                            o.frequency.linearRampToValueAtTime(1000, c.currentTime + 0.15);
                            o.frequency.linearRampToValueAtTime(800, c.currentTime + 0.3);
                            g.gain.setValueAtTime(0.1, c.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
                            o.connect(g); g.connect(c.destination);
                            o.start(); o.stop(c.currentTime + 0.35);
                        }, i * 350);
                    }
                } catch(e) {}
            },
            speakBilingual(es, en) {
                if (!('speechSynthesis' in window)) return;
                this.initContext();
                try { speechSynthesis.cancel(); } catch(e) {}
                setTimeout(() => {
                    const u = new SpeechSynthesisUtterance(es);
                    u.lang = 'es-ES';
                    u.rate = 0.95;
                    u.onend = () => {
                        const u2 = new SpeechSynthesisUtterance(en);
                        u2.lang = 'en-US';
                        u2.rate = 0.95;
                        speechSynthesis.speak(u2);
                    };
                    speechSynthesis.speak(u);
                }, 80);
            }
        };
        function speakCountry() { AudioController.speakBilingual('Marruecos', 'Morocco'); }
        function triggerAlarm() { AudioController.alarm(); setTimeout(() => AudioController.speakBilingual('¡Alarma de Marruecos!', 'Morocco Alarm!'), 750); }
        function playAudio(text) {
            const labels = { 'Marruecos / Morocco':['Marruecos','Morocco'], 'Rojo':['Rojo','Red'], 'Verde':['Verde','Green'], 'Victory':['¡Lo lograste!','You did it!'] };
            const pair = labels[text] || [text, text];
            AudioController.speakBilingual(pair[0], pair[1]);
        }

        let selectedColor = null;
        let paintedBg = false;
        let paintedStar = false;

        function selectColor(color) {
            selectedColor = color;
            document.querySelectorAll('.flex-col.items-center button').forEach(btn => { btn.style.transform = 'scale(1)'; btn.style.boxShadow = '0 10px 15px -3px rgb(0 0 0 / 0.1)'; });
            event.target.style.transform = 'scale(1.2)';
            event.target.style.boxShadow = '0 0 0 4px #006495';
            const labels = { 'red':['Rojo','Red'], 'green':['Verde','Green'] };
            const pair = labels[color] || [color, color];
            AudioController.speakBilingual(pair[0], pair[1]);
        }

        const canvas = document.getElementById('paint-canvas');
        const flagBg = document.getElementById('flag-bg');
        const flagStar = document.getElementById('flag-star').parentElement;
        const success = document.getElementById('success-overlay');

        canvas.addEventListener('click', (e) => {
            if (!selectedColor) return;

            // Simple hit detection for background vs star
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Check if clicking near the center (the star)
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const distance = Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2));

            if (distance < rect.width * 0.15) {
                // Clicked on star
                if (selectedColor === 'green') {
                    flagStar.classList.remove('text-surface-container');
                    flagStar.classList.add('text-[#006233]');
                    paintedStar = true;
                    playAudio('Verde');
                }
            } else {
                // Clicked on background
                if (selectedColor === 'red') {
                    flagBg.style.backgroundColor = '#C1272D';
                    flagBg.classList.remove('scribble-texture');
                    paintedBg = true;
                    playAudio('Rojo');
                }
            }

            checkWin();
        });

        function checkWin() {
            if (paintedBg && paintedStar) {
                setTimeout(() => {
                    success.classList.remove('hidden');
                    success.classList.add('flex');
                    playAudio('Victory');
                }, 500);
            }
        }

        function playAudio(text) { /* see AudioController above */ }
    
        
        function checkCompletion() {
            const parts = document.querySelectorAll('#flag-canvas [id^="part-"], #flag-canvas [id^="stripe-"]');
            const done = [...parts].every(p => p.dataset.painted === 'true' || (p.style.backgroundColor && p.style.backgroundColor !== 'transparent' && p.style.backgroundColor !== ''));
            if (done) {
                AudioController.speakBilingual('¡Lo lograste! ¡Bandera completa!', 'You did it! Flag complete!');
                document.getElementById('flag-canvas').classList.add('celebration');
                setTimeout(() => {
                    window.location.href = `../celebration_reward/index.html?country=${COUNTRY_ID}`;
                }, 2000);
            } else {
                AudioController.speakBilingual('¡Sigue pintando!', 'Keep painting!');
            }
        }

        // Auto-painted observer to dynamically track coloring
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                    const target = mutation.target;
                    if (target.style.backgroundColor && target.style.backgroundColor !== 'transparent' && target.style.backgroundColor !== '') {
                        target.dataset.painted = 'true';
                    } else {
                        target.removeAttribute('data-painted');
                    }
                }
            });
        });
        const canvas = document.getElementById('flag-canvas');
        if (canvas) {
            observer.observe(canvas, {
                attributes: true,
                subtree: true,
                attributeFilter: ['style']
            });
        }
        </script>
