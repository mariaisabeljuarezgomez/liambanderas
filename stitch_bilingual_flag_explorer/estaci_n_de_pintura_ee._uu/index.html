<script>

    // Audio Controller Module
    const AudioController = {
        ctx: null,
        
        initContext() {
            if (!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
        },

        playSynth(freq, type, duration = 0.2, volume = 0.1) {
            try {
                this.initContext();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(volume, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            } catch(e) {
                console.log(e);
            }
        },

        boing() {
            this.playSynth(150, 'sine', 0.3, 0.25);
            this.playSynth(100, 'square', 0.1, 0.05);
        },

        sparkleSound() {
            try {
                this.initContext();
                const now = this.ctx.currentTime;
                [880, 1100, 1320].forEach((f, i) => {
                    setTimeout(() => {
                        this.playSynth(f, 'triangle', 0.15, 0.05);
                    }, i * 60);
                });
            } catch(e) {}
        },

        victory() {
            try {
                this.initContext();
                const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
                notes.forEach((f, i) => {
                    setTimeout(() => this.playSynth(f, 'sine', 0.4, 0.1), i * 120);
                });
            } catch(e) {}
        },

        alarmSound() {
            try {
                this.initContext();
                const now = this.ctx.currentTime;
                for (let j = 0; j < 3; j++) {
                    setTimeout(() => {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                        osc.frequency.linearRampToValueAtTime(1000, this.ctx.currentTime + 0.15);
                        osc.frequency.linearRampToValueAtTime(800, this.ctx.currentTime + 0.3);
                        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                        osc.connect(gain);
                        gain.connect(this.ctx.destination);
                        osc.start();
                        osc.stop(this.ctx.currentTime + 0.35);
                    }, j * 350);
                }
            } catch(e) {}
        },

        speakBilingual(es, en) {
            if (!('speechSynthesis' in window)) return;
            this.initContext();
            try { window.speechSynthesis.cancel(); } catch(e) {}
            setTimeout(() => {
                const uEs = new SpeechSynthesisUtterance(es);
                uEs.lang = 'es-ES';
                uEs.rate = 0.95;
                
                uEs.onend = () => {
                    const uEn = new SpeechSynthesisUtterance(en);
                    uEn.lang = 'en-US';
                    uEn.rate = 0.95;
                    window.speechSynthesis.speak(uEn);
                };
                window.speechSynthesis.speak(uEs);
            }, 80);
        }
    };

    // Country configuration
    const COUNTRY_ID = 'usa';
    const COUNTRY_NAME_ES = 'Estados Unidos';
    const COUNTRY_NAME_EN = 'United States';
    const ALARM_TEXT_ES = '¡Alarma de Estados Unidos!';
    const ALARM_TEXT_EN = 'United States Alarm!';

    function speakCountry() {
        AudioController.speakBilingual(COUNTRY_NAME_ES, COUNTRY_NAME_EN);
    }

    function triggerAlarm() {
        AudioController.alarmSound();
        setTimeout(() => {
            AudioController.speakBilingual(ALARM_TEXT_ES, ALARM_TEXT_EN);
        }, 600);
    }

        let currentColor = '#ba1a1a';
        let activeColorName = 'rojo';

        function selectColor(color, name) {
            currentColor = color;
            activeColorName = name;
            
            // UI Feedback for selected brush
            document.querySelectorAll('[id^="brush-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`brush-${name}`).classList.remove('hidden');
            
            const labels = {
                'rojo': 'Rojo... Red',
                'blanco': 'Blanco... White',
                'azul': 'Azul... Blue'
            };
            AudioController.speakBilingual(labels[name].split('...')[0].trim(), labels[name].split('...')[1].trim());
        }

        // Initialize first color
        window.addEventListener('DOMContentLoaded', () => {
            selectColor('#ba1a1a', 'rojo');
        });

        // Set up references
        const stripes = Array.from(document.querySelectorAll('.paint-zone[data-type="stripe"]'));
        const union = document.querySelector('.paint-zone[data-type="union"]');
        
        let paintedState = {
            union: null,
            stripes: Array(13).fill(null)
        };

        // Click validation logic
        stripes.forEach((stripe, index) => {
            stripe.addEventListener('click', (e) => {
                const correctColor = (index % 2 === 0) ? 'rojo' : 'blanco';
                if (activeColorName === correctColor) {
                    stripe.setAttribute('fill', currentColor);
                    stripe.setAttribute('stroke', 'transparent');
                    paintedState.stripes[index] = activeColorName;
                    AudioController.speakBilingual('¡Correcto!', 'Correct!');
                    AudioController.sparkleSound();
                    checkCompletion();
                } else {
                    AudioController.boing();
                    stripe.animate([
                        { transform: 'translateX(0px)' },
                        { transform: 'translateX(-5px)' },
                        { transform: 'translateX(5px)' },
                        { transform: 'translateX(0px)' }
                    ], { duration: 200 });
                }
            });
        });

        union.addEventListener('click', (e) => {
            const correctColor = 'azul';
            if (activeColorName === correctColor) {
                union.setAttribute('fill', currentColor);
                union.setAttribute('stroke', 'transparent');
                paintedState.union = activeColorName;
                
                // Add "painted" look by changing star colors to white
                document.querySelectorAll('#stars circle').forEach(star => star.setAttribute('fill', '#FFFFFF'));
                
                AudioController.speakBilingual('¡Correcto!', 'Correct!');
                AudioController.sparkleSound();
                checkCompletion();
            } else {
                AudioController.boing();
                union.animate([
                    { transform: 'translateX(0px)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(0px)' }
                ], { duration: 200 });
            }
        });

        function resetFlag() {
            stripes.forEach(stripe => {
                stripe.setAttribute('fill', '#FFFFFF');
                stripe.setAttribute('stroke', '#D1D5DB');
            });
            union.setAttribute('fill', '#FFFFFF');
            union.setAttribute('stroke', '#D1D5DB');
            document.querySelectorAll('#stars circle').forEach(star => star.setAttribute('fill', '#F0F4FB'));
            
            paintedState = {
                union: null,
                stripes: Array(13).fill(null)
            };
            document.getElementById('celebration').classList.add('opacity-0');
        }

        function checkCompletion() {
            const stripesWin = paintedState.stripes.every((color, idx) => {
                const correctColor = (idx % 2 === 0) ? 'rojo' : 'blanco';
                return color === correctColor;
            });
            const unionWin = paintedState.union === 'azul';
            
            if (stripesWin && unionWin) {
                const celebration = document.getElementById('celebration');
                celebration.classList.remove('opacity-0');
                AudioController.victory();
                setTimeout(() => {
                    window.location.href = `../celebration_reward/index.html?country=${COUNTRY_ID}`;
                }, 2000);
            }
        }
        
</script>
