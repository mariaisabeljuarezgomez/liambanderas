<script>const COUNTRY_ID = 'per';

        // ── AUDIO SYSTEM ──────────────────────────────────────────
        const AudioController = {
            ctx: null,
            initContext() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            alarm() {
                try {
                    this.initContext();
                    const c = this.ctx;
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            const o = c.createOscillator(), g = c.createGain();
                            o.type = 'sawtooth';
                            o.frequency.setValueAtTime(800, c.currentTime);
                            o.frequency.linearRampToValueAtTime(1000, c.currentTime + 0.15);
                            o.frequency.linearRampToValueAtTime(800, c.currentTime + 0.3);
                            g.gain.setValueAtTime(0.1, c.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
                            o.connect(g); g.connect(c.destination);
                            o.start(); o.stop(c.currentTime + 0.35);
                        }, i * 350);
                    }
                } catch(e) {}
            },
            speakBilingual(es, en) {
                if (!('speechSynthesis' in window)) return;
                this.initContext();
                try { speechSynthesis.cancel(); } catch(e) {}
                setTimeout(() => {
                    const u = new SpeechSynthesisUtterance(es);
                    u.lang = 'es-ES';
                    u.rate = 0.95;
                    u.onend = () => {
                        const u2 = new SpeechSynthesisUtterance(en);
                        u2.lang = 'en-US';
                        u2.rate = 0.95;
                        speechSynthesis.speak(u2);
                    };
                    speechSynthesis.speak(u);
                }, 80);
            }
        };
        function speakCountry() { AudioController.speakBilingual('Perú', 'Peru'); }
        function triggerAlarm() { AudioController.alarm(); setTimeout(() => AudioController.speakBilingual('¡Alarma de Perú!', 'Peru Alarm!'), 750); }

        let selectedColorClass = '';

        function selectColor(colorClass) {
            selectedColorClass = colorClass;
            document.querySelectorAll('[id^="paint-"]').forEach(btn => { btn.style.transform = 'translateY(0)'; });
            event.currentTarget.style.transform = 'translateY(4px)';
            const labels = { 'bg-[#D91023]':['Rojo','Red'], 'bg-white':['Blanco','White'] };
            const pair = labels[colorClass] || [colorClass, colorClass];
            AudioController.speakBilingual(pair[0], pair[1]);
        }

        function paintBand(element) {
            if (!selectedColorClass) {
                alert("¡Primero elige un color de los botes!");
                return;
            }
            
            // Remove previous bg classes
            element.className = element.className.replace(/\bbg-\S+/g, '');
            element.classList.add(selectedColorClass);

            checkWinCondition();
        }

        function playAudio(word) {
            const labels = { 'rojo':['Rojo','Red'], 'blanco':['Blanco','White'] };
            const pair = labels[word] || [word, word];
            AudioController.speakBilingual(pair[0], pair[1]);
        }

        function checkWinCondition() {
            const bands = document.querySelectorAll('.flag-band');
            let allCorrect = true;
            
            bands.forEach(band => {
                const correct = band.getAttribute('data-correct-color');
                if (!band.classList.contains(correct)) {
                    allCorrect = false;
                }
            });

            if (allCorrect) {
                const celebration = document.getElementById('celebration');
                celebration.classList.remove('opacity-0');
                celebration.classList.add('opacity-100');
                setTimeout(() => AudioController.speakBilingual("¡Excelente! Has pintado la bandera de Perú.", "Excellent! You painted the flag of Peru."), 500);
            }
        }
    
        
        function checkCompletion() {
            const parts = document.querySelectorAll('#flag-canvas [id^="part-"], #flag-canvas [id^="stripe-"]');
            const done = [...parts].every(p => p.dataset.painted === 'true' || (p.style.backgroundColor && p.style.backgroundColor !== 'transparent' && p.style.backgroundColor !== ''));
            if (done) {
                AudioController.speakBilingual('¡Lo lograste! ¡Bandera completa!', 'You did it! Flag complete!');
                document.getElementById('flag-canvas').classList.add('celebration');
                setTimeout(() => {
                    window.location.href = `../celebration_reward/index.html?country=${COUNTRY_ID}`;
                }, 2000);
            } else {
                AudioController.speakBilingual('¡Sigue pintando!', 'Keep painting!');
            }
        }

        // Auto-painted observer to dynamically track coloring
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                    const target = mutation.target;
                    if (target.style.backgroundColor && target.style.backgroundColor !== 'transparent' && target.style.backgroundColor !== '') {
                        target.dataset.painted = 'true';
                    } else {
                        target.removeAttribute('data-painted');
                    }
                }
            });
        });
        const canvas = document.getElementById('flag-canvas');
        if (canvas) {
            observer.observe(canvas, {
                attributes: true,
                subtree: true,
                attributeFilter: ['style']
            });
        }
        </script>
